<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.0 Cookies - Cookie Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap');

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.5s ease;
            position: relative;
        }

        body.golden-frenzy {
            background-color: #433200;
            background-image: 
                radial-gradient(circle, #b8860b44 0%, #1a1a1a 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='100' r='90' fill='%23ffd700' fill-opacity='0.1' /%3E%3Ccircle cx='60' cy='60' r='10' fill='%23d4af37' fill-opacity='0.1' /%3E%3Ccircle cx='140' cy='140' r='10' fill='%23d4af37' fill-opacity='0.1' /%3E%3C/svg%3E");
            animation: frenzy-bg-slide 10s linear infinite;
        }

        @keyframes frenzy-bg-slide {
            from { background-position: 0 0; }
            to { background-position: 300px 300px; }
        }

        .cookie-container {
            perspective: 1000px;
        }

        #main-cookie {
            transition: transform 0.1s ease-in-out;
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(210, 105, 30, 0.4));
        }

        #main-cookie:hover {
            transform: scale(1.05);
        }

        #main-cookie:active {
            transform: scale(0.95);
        }

        @keyframes wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        #main-cookie.shaking {
            animation: wobble 0.1s infinite;
            filter: drop-shadow(0 0 30px #ffd700);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fly-up 1s ease-out forwards;
            font-weight: bold;
            z-index: 200;
        }

        @keyframes fly-up {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1.5); opacity: 0; }
        }

        .upgrade-card {
            background: #2a2a2a;
            border: 2px solid #3a3a3a;
            transition: all 0.2s;
        }

        .upgrade-card:hover:not(.disabled) {
            background: #3a3a3a;
            border-color: #d2691e;
            transform: translateX(-5px);
        }

        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
            grayscale: 1;
        }

        .scroller::-webkit-scrollbar {
            width: 8px;
        }

        .scroller::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .scroller::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .floating-cookie {
            position: absolute;
            pointer-events: none;
            z-index: 50;
            animation: cookie-float 2s linear forwards;
        }

        @keyframes cookie-float {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(360deg); opacity: 0; }
        }

        .stats-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        #frenzy-meter-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 24px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            z-index: 100;
        }

        #frenzy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            transition: width 0.1s linear;
        }

        .multiplier-tag {
            position: absolute;
            right: 10px;
            top: 0;
            font-weight: bold;
            font-size: 14px;
            line-height: 24px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Special Cookie Physics Elements */
        .special-cookie-wrapper {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 150;
            pointer-events: none;
        }

        .special-cookie-hitbox {
            width: 100%;
            height: 100%;
            cursor: pointer;
            pointer-events: auto;
            position: relative;
        }

        .golden-cookie { filter: drop-shadow(0 0 15px #ffd700); }
        .blue-cookie { filter: drop-shadow(0 0 15px #00aaff); }
        .green-cookie { filter: drop-shadow(0 0 15px #00ff44); }

        .countdown-text {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        .wings {
            position: absolute;
            top: 0;
            left: -20px;
            width: 100px;
            height: 40px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .wings-visible {
            opacity: 1;
        }

        @keyframes flap {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-20deg); }
            100% { transform: rotate(0deg); }
        }

        .wing-left {
            transform-origin: right center;
            animation: flap 0.2s ease-in-out infinite;
        }

        .wing-right {
            transform-origin: left center;
            animation: flap 0.2s ease-in-out infinite reverse;
        }

        #prestige-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 220px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <div id="frenzy-meter-container">
        <div id="frenzy-bar"></div>
        <div id="multiplier-display" class="multiplier-tag">x1.0</div>
    </div>

    <div id="prestige-container">
        <div id="prestige-needed" class="text-[10px] text-orange-400 font-bold mb-1">
            Left: 100.0 B
        </div>
        <div class="flex justify-between text-[10px] mb-1">
            <span>PRESTIGE PROGRESS</span>
            <span id="prestige-percent">0%</span>
        </div>
        <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
            <div id="prestige-bar" class="bg-purple-500 h-full w-0"></div>
        </div>
        <button id="prestige-btn" onclick="prestige()" class="hidden mt-2 w-full bg-purple-600 hover:bg-purple-500 text-white text-[10px] font-bold py-1 rounded transition">
            PRESTIGE NOW!
        </button>
        <div id="current-bonus-display" class="text-[9px] text-zinc-400 mt-1">Current Bonus: +0%</div>
    </div>

    <div id="cookie-area" class="flex-1 flex flex-col items-center justify-center p-8 relative">
        <div class="text-center mb-8 z-10">
            <h1 id="cookie-count" class="text-5xl font-bold mb-2">0.0 Cookies</h1>
            <p id="cps-display" class="text-xl text-orange-400">per second: 0</p>
        </div>

        <div class="cookie-container z-10">
            <svg id="main-cookie" width="300" height="300" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="#d2691e" />
                <circle cx="100" cy="100" r="80" fill="#cd853f" />
                <circle cx="60" cy="60" r="8" fill="#4b3621" />
                <circle cx="140" cy="70" r="10" fill="#4b3621" />
                <circle cx="80" cy="130" r="9" fill="#4b3621" />
                <circle cx="120" cy="150" r="7" fill="#4b3621" />
                <circle cx="160" cy="110" r="11" fill="#4b3621" />
                <circle cx="50" cy="110" r="8" fill="#4b3621" />
                <circle cx="100" cy="90" r="9" fill="#4b3621" />
            </svg>
        </div>

        <div id="particle-container" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <div id="shop-container" class="w-full md:w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
        <div class="p-6 border-b border-zinc-800 stats-panel">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span>🛒</span> Shop
            </h2>
            <div class="flex justify-between text-sm text-zinc-400">
                <span>Total Clicks: <span id="stat-total-clicks">0</span></span>
                <span>All-time: <span id="stat-all-time">0.0</span></span>
            </div>
        </div>

        <div id="shop-items" class="flex-1 overflow-y-auto scroller p-4 space-y-3">
        </div>

        <div class="p-4 bg-zinc-800 text-center text-xs text-zinc-500">
            Developed by <a href="https://discord.com/users/1056147064569987163" target="_blank" class="text-orange-400 hover:underline font-bold">kinetx</a>
        </div>
    </div>

    <script>
        // Startwerte für den Game-State (Click Power auf 1 zurückgesetzt)
        let state = {
            cookies: 0.0,
            totalCookiesEarned: 0.0,
            totalClicks: 0,
            cps: 0,
            clickPower: 1, // Reset auf Basis-Wert
            lastTick: Date.now(),
            unlockedUpgrades: 1,
            clickHeat: 0,
            multiplier: 1.0,
            prestigeLevel: 0,
            prestigeBonus: 1.0, 
            goldenCookieTimer: 0,
            blueCookieSpawnTimer: 0,
            randomGoldenSpawnTimer: 0
        };

        const PRESTIGE_THRESHOLD = 100000000000;
        const MILESTONES = [10, 25, 50, 100, 200, 500, 1000];

        // Upgrades mit dem Klick-Upgrade (count: 0) ganz oben
        let baseUpgrades = [
            { id: 'clicker', name: 'Stronger Grip', description: 'Double your clicking power.', basePrice: 25, baseCps: 0, clickMult: 2, count: 0, icon: '💪' },
            { id: 'cursor', name: 'Cursor', description: 'Autoclicks once every 10 seconds.', basePrice: 15, baseCps: 0.1, count: 0, icon: '🖱️' },
            { id: 'grandma', name: 'Grandma', description: 'A nice grandmother to bake more cookies.', basePrice: 100, baseCps: 1, count: 0, icon: '👵' },
            { id: 'farm', name: 'Farm', description: 'Grows cookie plants from cookie seeds.', basePrice: 1100, baseCps: 8, count: 0, icon: '🌾' },
            { id: 'mine', name: 'Mine', description: 'Mines out cookie dough and chocolate chips.', basePrice: 12000, baseCps: 47, count: 0, icon: '⛏️' },
            { id: 'factory', name: 'Factory', description: 'Mass produces cookies.', basePrice: 130000, baseCps: 260, count: 0, icon: '🏭' },
            { id: 'bank', name: 'Bank', description: 'Generates cookies from interest.', basePrice: 1400000, baseCps: 1400, count: 0, icon: '🏦' },
            { id: 'temple', name: 'Temple', description: 'Full of cookie gods.', basePrice: 20000000, baseCps: 7800, count: 0, icon: '🏛️' },
            { id: 'wizard', name: 'Wizard Tower', description: 'Summons cookies with magic.', basePrice: 330000000, baseCps: 44000, count: 0, icon: '🧙' }
        ];

        let upgrades = JSON.parse(JSON.stringify(baseUpgrades));
        let activeSpecialCookies = [];

        /**
         * Berechnet den Meilenstein-Boost basierend auf der Anzahl der Upgrades
         */
        function getUpgradeEfficiencyMult(count) {
            let mult = 1;
            MILESTONES.forEach(m => {
                if (count >= m) mult *= 2;
            });
            return mult;
        }

        /**
         * Zeigt Sterne als visuelle Belohnung für erreichte Meilensteine
         */
        function getStarsForCount(count) {
            let stars = "";
            if (count >= 1000) stars = "⭐⭐⭐⭐⭐⭐⭐";
            else if (count >= 500) stars = "⭐⭐⭐⭐⭐⭐";
            else if (count >= 200) stars = "⭐⭐⭐⭐⭐";
            else if (count >= 100) stars = "⭐⭐⭐⭐";
            else if (count >= 50) stars = "⭐⭐⭐";
            else if (count >= 25) stars = "⭐⭐";
            else if (count >= 10) stars = "⭐";
            return stars;
        }

        /**
         * Generiert neue futuristische Upgrades für den Infinite-Modus
         */
        function generateNextUpgrade() {
            const last = upgrades[upgrades.length - 1];
            const icons = ['🚀', '🌌', '⚡', '🤖', '👑', '🔮', '💎', '🪐', '🧬', '🛸'];
            const names = ['Ship', 'Galaxy', 'Energy', 'Bot', 'Empire', 'Portal', 'Gem', 'Planet', 'Clone', 'Alien'];
            const nextIndex = upgrades.length - 8; 
            const icon = icons[nextIndex % icons.length];
            const name = names[nextIndex % names.length] + ' ' + (Math.floor(nextIndex / names.length) + 2);
            upgrades.push({
                id: 'infinite-' + upgrades.length,
                name: name,
                description: `A futuristic ${name} for even more cookies.`,
                basePrice: last.basePrice * 12,
                baseCps: last.baseCps * 6,
                count: 0,
                icon: icon
            });
        }

        const cookieDisplay = document.getElementById('cookie-count');
        const cpsDisplay = document.getElementById('cps-display');
        const mainCookie = document.getElementById('main-cookie');
        const shopItems = document.getElementById('shop-items');
        const particleContainer = document.getElementById('particle-container');
        const statTotalClicks = document.getElementById('stat-total-clicks');
        const statAllTime = document.getElementById('stat-all-time');
        const frenzyBar = document.getElementById('frenzy-bar');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const prestigeBar = document.getElementById('prestige-bar');
        const prestigePercent = document.getElementById('prestige-percent');
        const prestigeBtn = document.getElementById('prestige-btn');
        const currentBonusDisplay = document.getElementById('current-bonus-display');
        const prestigeNeeded = document.getElementById('prestige-needed');

        /**
         * Initialisiert den Shop und zeigt verfügbare Upgrades an
         */
        function initShop() {
            shopItems.innerHTML = '';
            for (let i = 0; i < state.unlockedUpgrades; i++) {
                const upgrade = upgrades[i];
                if (!upgrade) continue;
                const card = document.createElement('div');
                card.id = `upgrade-${upgrade.id}`;
                card.className = 'upgrade-card p-4 rounded-xl flex items-center gap-4 cursor-pointer disabled';
                card.onclick = () => buyUpgrade(i);
                
                let bonusType = upgrade.clickMult ? `Click Power x${upgrade.clickMult}` : `Each +${formatNumber(upgrade.baseCps)} CPS`;
                
                card.innerHTML = `
                    <div class="text-3xl">${upgrade.icon}</div>
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <span class="font-bold">${upgrade.name}</span>
                            <span class="text-orange-400 font-bold" id="price-${upgrade.id}">${formatNumber(upgrade.basePrice)}</span>
                        </div>
                        <div class="text-xs text-zinc-400">${upgrade.description}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <div class="text-[10px] text-zinc-500">${bonusType}</div>
                            <div class="text-[10px] text-orange-500 font-bold hidden" id="boost-${upgrade.id}">Boost: x1</div>
                        </div>
                    </div>
                    <div class="text-2xl font-bold opacity-20" id="count-${upgrade.id}">0</div>
                `;
                shopItems.appendChild(card);
            }
        }

        /**
         * Formatiert große Zahlen in lesbare Suffixe (k, M, B, T, Q)
         */
        function formatNumber(num) {
            if (num >= 1e15) return (num / 1e15).toFixed(3) + ' Q';
            if (num >= 1e12) return (num / 1e12).toFixed(3) + ' T';
            if (num >= 1e9) return (num / 1e9).toFixed(3) + ' B';
            if (num >= 1000000) return (num / 1000000).toFixed(3) + ' M';
            if (num >= 1000) return (num / 1000).toFixed(2) + ' k';
            return num.toFixed(1);
        }

        /**
         * Logik für den Klick auf den Hauptkeks
         */
        function clickCookie(e) {
            const amount = state.clickPower * state.multiplier * state.prestigeBonus;
            addCookies(amount);
            state.totalClicks++;
            state.clickHeat = Math.min(100, state.clickHeat + 5);
            createParticle(e.clientX, e.clientY, `+${amount.toFixed(1)}`);
            spawnFloatingCookie();
            updateUI();
            saveGame();
        }

        function addCookies(amount) {
            state.cookies += amount;
            state.totalCookiesEarned += amount;
        }

        /**
         * Kauf-Logik für Upgrades im Shop
         */
        function buyUpgrade(index) {
            const upgrade = upgrades[index];
            const currentPrice = getPrice(upgrade);
            if (state.cookies >= currentPrice) {
                state.cookies -= currentPrice;
                upgrade.count++;
                
                if (upgrade.clickMult) {
                    state.clickPower *= upgrade.clickMult;
                }
                
                if (index === state.unlockedUpgrades - 1 && upgrade.count >= 5) {
                    state.unlockedUpgrades++;
                    if (state.unlockedUpgrades > upgrades.length) {
                        generateNextUpgrade();
                    }
                    initShop();
                }
                calculateCPS();
                updateUI();
                saveGame();
            }
        }

        function getPrice(upgrade) {
            return Math.floor(upgrade.basePrice * Math.pow(1.15, upgrade.count));
        }

        /**
         * Berechnet die Cookies pro Sekunde basierend auf Upgrades und Meilensteinen
         */
        function calculateCPS() {
            state.cps = upgrades.reduce((sum, up) => {
                const mult = getUpgradeEfficiencyMult(up.count);
                return sum + (up.count * (up.baseCps || 0) * mult);
            }, 0);
        }

        /**
         * Erstellt Partikel-Effekte beim Klicken
         */
        function createParticle(x, y, text) {
            const p = document.createElement('div');
            p.className = 'particle text-orange-400';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.innerText = text;
            particleContainer.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }

        /**
         * Spawnt einen kleinen fliegenden Keks als visuellen Effekt
         */
        function spawnFloatingCookie() {
            const f = document.createElement('div');
            f.className = 'floating-cookie';
            const size = 20 + Math.random() * 30;
            f.style.width = size + 'px';
            f.style.height = size + 'px';
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 100;
            f.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            f.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            const rect = mainCookie.getBoundingClientRect();
            f.style.left = (rect.left + rect.width / 2) + 'px';
            f.style.top = (rect.top + rect.height / 2) + 'px';
            f.innerHTML = `<svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="#d2691e" /><circle cx="60" cy="60" r="10" fill="#4b3621" /><circle cx="140" cy="140" r="10" fill="#4b3621" /></svg>`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 2000);
        }

        /**
         * Physik-basiertes System für Spezial-Kekse (Gold, Blau, Grün)
         */
        function spawnSpecialCookie(type, x, y, vx = 0, vy = 0) {
            const wrapper = document.createElement('div');
            wrapper.className = `special-cookie-wrapper ${type}-cookie`;
            
            // Spawn nur im linken Keks-Bereich
            const cookieArea = document.getElementById('cookie-area');
            const areaRect = cookieArea.getBoundingClientRect();
            
            let startX = x !== undefined ? x : areaRect.left + 50 + Math.random() * (areaRect.width - 100);
            let startY = y !== undefined ? y : -100;

            const colorMap = { 'golden': '#ffd700', 'blue': '#00aaff', 'green': '#00ff44' };
            const shadowMap = { 'golden': '#ffcc00', 'blue': '#0077ff', 'green': '#00cc33' };

            wrapper.innerHTML = `
                <svg class="wings" viewBox="0 0 100 40">
                    <path class="wing-left" d="M30 20 C10 0, 0 10, 30 20" fill="white" stroke="gray" />
                    <path class="wing-right" d="M70 20 C90 0, 100 10, 70 20" fill="white" stroke="gray" />
                </svg>
                <div class="special-cookie-hitbox">
                    <div class="countdown-text"></div>
                    <svg viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="90" fill="${colorMap[type]}" />
                        <circle cx="100" cy="100" r="80" fill="${shadowMap[type]}" />
                        <circle cx="60" cy="60" r="8" fill="rgba(0,0,0,0.2)" />
                        <circle cx="140" cy="140" r="10" fill="rgba(0,0,0,0.2)" />
                    </svg>
                </div>
            `;

            document.body.appendChild(wrapper);

            const cookieObj = {
                element: wrapper,
                hitbox: wrapper.querySelector('.special-cookie-hitbox'),
                countdownEl: wrapper.querySelector('.countdown-text'),
                wingsEl: wrapper.querySelector('.wings'),
                type: type,
                x: startX,
                y: startY,
                vx: vx,
                vy: vy,
                gravity: 0.12, // Langsames Fallen
                friction: 0.98,
                bounce: 0.6,
                state: 'falling', // falling, settled, flying
                timer: 0,
                settledAt: 0,
                id: Math.random(),
                flyVx: 0
            };

            cookieObj.hitbox.onclick = (e) => {
                e.stopPropagation();
                if (cookieObj.type === 'blue') {
                    // Zerplatzt in 3 grüne Kekse
                    for(let i=0; i<3; i++) {
                        spawnSpecialCookie('green', cookieObj.x, cookieObj.y, (Math.random()-0.5)*10, -5 - Math.random()*5);
                    }
                    createParticle(e.clientX, e.clientY, "SPLIT!");
                } else if (cookieObj.type === 'green') {
                    // Zerplatzt in 3 goldene Kekse
                    for(let i=0; i<3; i++) {
                        spawnSpecialCookie('golden', cookieObj.x, cookieObj.y, (Math.random()-0.5)*10, -5 - Math.random()*5);
                    }
                    createParticle(e.clientX, e.clientY, "FRAGMENTS!");
                } else if (cookieObj.type === 'golden') {
                    const bonus = Math.max(10, state.cps * 60); 
                    addCookies(bonus);
                    createParticle(e.clientX, e.clientY, `GOLDEN! +${formatNumber(bonus)}`);
                }
                removeCookie(cookieObj.id);
            };

            activeSpecialCookies.push(cookieObj);
        }

        function removeCookie(id) {
            const idx = activeSpecialCookies.findIndex(c => c.id === id);
            if (idx !== -1) {
                activeSpecialCookies[idx].element.remove();
                activeSpecialCookies.splice(idx, 1);
            }
        }

        /**
         * Berechnet die Flug- und Aufprallphysik der Spezial-Kekse
         */
        function updateSpecialPhysics() {
            const ground = window.innerHeight - 80;
            const shopContainer = document.getElementById('shop-container');
            const shopLeftBound = shopContainer.getBoundingClientRect().left;

            activeSpecialCookies.forEach(c => {
                if (c.state === 'falling') {
                    c.vy += c.gravity;
                    c.x += c.vx;
                    c.y += c.vy;

                    // Boden-Kollision
                    if (c.y >= ground) {
                        c.y = ground;
                        c.vy *= -c.bounce;
                        c.vx *= 0.8;

                        if (Math.abs(c.vy) < 1) {
                            c.state = 'settled';
                            c.settledAt = Date.now();
                            c.timer = 3.0; // 3 Sekunden Countdown
                        }
                    }

                    // Wand- und Shop-Kollision
                    if (c.x < 0) {
                        c.x = 0;
                        c.vx *= -1;
                    }
                    if (c.x > shopLeftBound - 60) {
                        c.x = shopLeftBound - 60;
                        c.vx *= -1;
                    }
                } else if (c.state === 'settled') {
                    c.timer -= 0.016; 
                    if (c.timer <= 0) {
                        c.state = 'flying';
                        c.wingsEl.classList.add('wings-visible');
                        // Fliegt seitlich weg
                        c.flyVx = (Math.random() > 0.5 ? 1.5 : -1.5) * (Math.random() * 2 + 1);
                    } else {
                        c.countdownEl.innerText = c.timer.toFixed(1);
                    }
                } else if (c.state === 'flying') {
                    c.y -= 1.8; // Gleitet nach oben
                    c.x += c.flyVx; // Gleitet zur Seite
                    if (c.y < -100 || c.x < -100 || c.x > window.innerWidth + 100) {
                        removeCookie(c.id);
                        return;
                    }
                }

                c.element.style.transform = `translate(${c.x}px, ${c.y}px)`;
            });
        }

        /**
         * Führt das Prestige-Reset aus und gewährt Boni
         */
        function prestige() {
            if (state.cookies < PRESTIGE_THRESHOLD) return;
            const newBonusPoints = Math.floor(state.cookies / PRESTIGE_THRESHOLD);
            const extraBonus = newBonusPoints * 0.01; 
            state.prestigeBonus += extraBonus;
            state.prestigeLevel++;
            state.cookies = 0;
            state.cps = 0;
            state.clickPower = 1; // Reset auf Basis
            state.unlockedUpgrades = 1;
            state.clickHeat = 0;
            upgrades = JSON.parse(JSON.stringify(baseUpgrades));
            initShop();
            updateUI();
            saveGame();
            const p = document.createElement('div');
            p.className = 'fixed inset-0 flex items-center justify-center bg-black/80 z-[200] text-center p-10';
            p.innerHTML = `<div><h2 class="text-4xl font-bold text-purple-400 mb-4">PRESTIGE ASCENSION!</h2><p class="text-xl">You have ascended to level ${state.prestigeLevel}.</p><p class="text-2xl text-orange-400 mt-2">Current Bonus: +${((state.prestigeBonus - 1) * 100).toFixed(0)}%</p><button onclick="this.parentElement.parentElement.remove()" class="mt-8 px-6 py-2 bg-purple-600 rounded-full font-bold">CONTINUE BAKING</button></div>`;
            document.body.appendChild(p);
        }

        /**
         * Aktualisiert das gesamte Interface und die Browser-Anzeige
         */
        function updateUI() {
            cookieDisplay.innerText = `${formatNumber(state.cookies)} Cookies`;
            cpsDisplay.innerText = `per second: ${formatNumber(state.cps * state.multiplier * state.prestigeBonus)}`;
            statTotalClicks.innerText = state.totalClicks;
            statAllTime.innerText = formatNumber(state.totalCookiesEarned);
            document.title = `${formatNumber(state.cookies)} Cookies - Cookie Clicker`;
            
            // Multiplikator-Stufen
            if (state.clickHeat >= 100) state.multiplier = 5.0;
            else if (state.clickHeat >= 60) state.multiplier = 3.0;
            else if (state.clickHeat >= 25) state.multiplier = 1.5;
            else state.multiplier = 1.0;
            
            frenzyBar.style.width = state.clickHeat + '%';
            multiplierDisplay.innerText = `x${state.multiplier.toFixed(1)}`;
            
            // Visuelle Frenzy-Effekte
            if (state.multiplier >= 3.0) {
                document.body.classList.add('golden-frenzy');
                mainCookie.classList.add('shaking');
            } else {
                document.body.classList.remove('golden-frenzy');
                mainCookie.classList.remove('shaking');
            }
            if (state.multiplier >= 5) frenzyBar.classList.add('animate-pulse');
            else frenzyBar.classList.remove('animate-pulse');
            
            // Prestige-Fortschritt
            const remaining = Math.max(0, PRESTIGE_THRESHOLD - state.cookies);
            prestigeNeeded.innerText = `Left: ${formatNumber(remaining)}`;
            const prestigeProg = Math.min(100, (state.cookies / PRESTIGE_THRESHOLD) * 100);
            prestigeBar.style.width = prestigeProg + '%';
            prestigePercent.innerText = Math.floor(prestigeProg) + '%';
            
            if (state.cookies >= PRESTIGE_THRESHOLD) {
                prestigeBtn.classList.remove('hidden');
                prestigeNeeded.innerText = "Ready to Prestige!";
            } else prestigeBtn.classList.add('hidden');
            
            currentBonusDisplay.innerText = `Current Bonus: +${((state.prestigeBonus - 1) * 100).toFixed(0)}%`;
            
            // Upgrade-Karten aktualisieren
            for (let i = 0; i < state.unlockedUpgrades; i++) {
                const up = upgrades[i];
                if (!up) continue;
                const card = document.getElementById(`upgrade-${up.id}`);
                const priceLabel = document.getElementById(`price-${up.id}`);
                const countLabel = document.getElementById(`count-${up.id}`);
                const boostLabel = document.getElementById(`boost-${up.id}`);
                if (card && priceLabel && countLabel) {
                    const currentPrice = getPrice(up);
                    priceLabel.innerText = formatNumber(currentPrice);
                    countLabel.innerText = up.count;
                    const effMult = getUpgradeEfficiencyMult(up.count);
                    const stars = getStarsForCount(up.count);
                    if (effMult > 1) {
                        boostLabel.innerText = `${stars} Boost: x${effMult}`;
                        boostLabel.classList.remove('hidden');
                    } else boostLabel.classList.add('hidden');
                    if (state.cookies >= currentPrice) card.classList.remove('disabled');
                    else card.classList.add('disabled');
                }
            }
        }

        /**
         * Speichert den aktuellen Spielstand im lokalen Speicher
         */
        function saveGame() {
            const saveData = { state: state, upgradeCounts: upgrades.map(u => ({ id: u.id, count: u.count })) };
            localStorage.setItem('kinetx_cookie_save', JSON.stringify(saveData));
        }

        /**
         * Lädt den Spielstand und stellt den Fortschritt wieder her
         */
        function loadGame() {
            const saved = localStorage.getItem('kinetx_cookie_save');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state = { ...state, ...data.state };
                    state.clickHeat = 0;
                    state.multiplier = 1.0;
                    data.upgradeCounts.forEach((savedUp, index) => {
                        while (index >= upgrades.length) generateNextUpgrade();
                        if (upgrades[index]) upgrades[index].count = savedUp.count;
                    });
                    while (state.unlockedUpgrades > upgrades.length) generateNextUpgrade();
                    calculateCPS();
                    initShop();
                    updateUI();
                } catch (e) { console.error("Error loading save", e); }
            }
        }

        /**
         * Die Kern-Schleife der Engine für Logik und zeitabhängige Events
         */
        function runTick() {
            const now = Date.now();
            const delta = (now - state.lastTick) / 1000;
            if (delta < 0.001) return;
            state.lastTick = now;
            
            // Hitze-Abfall
            state.clickHeat = Math.max(0, state.clickHeat - (15 * delta));
            
            // Passive Generierung
            if (state.cps > 0) addCookies(state.cps * state.multiplier * state.prestigeBonus * delta);
            
            // Frenzy Gold-Kekse
            if (state.multiplier >= 3.0) {
                state.goldenCookieTimer += delta;
                if (state.goldenCookieTimer >= 5) {
                    spawnSpecialCookie('golden');
                    state.goldenCookieTimer = 0;
                }
            } else state.goldenCookieTimer = 0;
            
            // Zufällige Goldene Kekse (Sehr selten)
            state.randomGoldenSpawnTimer += delta;
            if (state.randomGoldenSpawnTimer >= 1.0) {
                if (Math.random() < 0.002) { 
                    spawnSpecialCookie('golden');
                }
                state.randomGoldenSpawnTimer = 0;
            }

            // Blaue Kekse Spawn-Check
            state.blueCookieSpawnTimer += delta;
            if (state.blueCookieSpawnTimer >= 1.0) {
                if (Math.random() < 0.01) spawnSpecialCookie('blue');
                state.blueCookieSpawnTimer = 0;
            }
            
            updateSpecialPhysics();
            updateUI();
        }

        /**
         * Frame-basierter Grafik-Loop
         */
        function gameLoop() {
            runTick();
            requestAnimationFrame(gameLoop);
        }

        // Intervalle für Hintergrund-Modus und Speichern
        setInterval(() => { runTick(); }, 1000);
        setInterval(saveGame, 30000);

        // Event-Listener für Interaktionen
        mainCookie.addEventListener('mousedown', (e) => { clickCookie(e); });
        mainCookie.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const rect = mainCookie.getBoundingClientRect();
                clickCookie({ clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
                mainCookie.style.transform = 'scale(0.95)';
            }
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') mainCookie.style.transform = ''; });

        // Start
        loadGame();
        initShop();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
