<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Beats Rock? - Infinite Edition</title>
    <style>
        /* 
           STYLING SECTION
           This section handles the visual appearance of the game.
           We use a bold, minimalist aesthetic similar to the original.
        */
        :root {
            --bg-color: #fdfd96;
            --text-color: #000000;
            --accent-color: #ff4444;
            --font-main: 'Arial Black', 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #game-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .current-item-box {
            font-size: 3rem;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 8px solid black;
            padding: 20px;
            background: white;
            box-shadow: 10px 10px 0px black;
        }

        .emoji-display {
            font-size: 5rem;
            display: block;
        }

        .input-area {
            margin-top: 30px;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 1.5rem;
            border: 5px solid black;
            outline: none;
            font-family: var(--font-main);
            text-transform: uppercase;
            text-align: center;
        }

        .message {
            margin-top: 20px;
            font-size: 1.2rem;
            height: 50px;
        }

        .history {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #333;
            max-height: 100px;
            overflow-y: auto;
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: shake 0.5s;
        }

        .win-flash {
            background-color: #90ee90 !important;
            transition: background 0.2s;
        }

        .lose-flash {
            background-color: #ffcccb !important;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">
            Score: <span id="current-score">0</span> | High: <span id="high-score">0</span>
        </div>

        <div id="display-box" class="current-item-box">
            <span id="target-emoji" class="emoji-display">🪨</span>
            <span id="target-name">ROCK</span>
        </div>

        <div class="message" id="game-message">What beats Rock?</div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type something..." autocomplete="off">
        </div>

        <div class="history" id="game-history"></div>
    </div>

    <script>
        /**
         * LOGIC ENGINE
         * This script manages the "What Beats Rock" gameplay.
         * It uses a rule-based system to simulate logic.
         */

        class WhatBeatsRock {
            constructor() {
                this.score = 0;
                this.highScore = localStorage.getItem('wbr_highScore') || 0;
                this.currentItem = "ROCK";
                this.currentEmoji = "🪨";
                this.history = [];
                
                // DOM Elements
                this.inputEl = document.getElementById('user-input');
                this.targetNameEl = document.getElementById('target-name');
                this.targetEmojiEl = document.getElementById('target-emoji');
                this.scoreEl = document.getElementById('current-score');
                this.highScoreEl = document.getElementById('high-score');
                this.messageEl = document.getElementById('game-message');
                this.displayBox = document.getElementById('display-box');
                this.historyEl = document.getElementById('game-history');

                this.init();
            }

            init() {
                this.highScoreEl.innerText = this.highScore;
                this.inputEl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.handleTurn();
                    }
                });
                this.updateDisplay();
            }

            // A database of properties to simulate "Logic"
            // Since we don't have a real LLM here, we use a complex rule system.
            getItemData(name) {
                const n = name.toUpperCase().trim();
                
                const library = {
                    "ROCK": { emoji: "🪨", type: "solid", strength: 10 },
                    "PAPER": { emoji: "📄", type: "cover", strength: 11 },
                    "SCISSORS": { emoji: "✂️", type: "sharp", strength: 12 },
                    "FIRE": { emoji: "🔥", type: "energy", strength: 20 },
                    "WATER": { emoji: "💧", type: "liquid", strength: 21 },
                    "GUN": { emoji: "🔫", type: "weapon", strength: 50 },
                    "BLACK HOLE": { emoji: "🕳️", type: "cosmic", strength: 1000 },
                    "GOD": { emoji: "✨", type: "divine", strength: 9999 },
                    "DYNAMITE": { emoji: "🧨", type: "explosive", strength: 30 },
                    "AIR": { emoji: "💨", type: "gas", strength: 5 },
                    "SLEDGEHAMMER": { emoji: "🔨", type: "heavy", strength: 25 },
                    "WALL": { emoji: "🧱", type: "solid", strength: 30 },
                    "LAVA": { emoji: "🌋", type: "liquid", strength: 40 },
                    "ICE": { emoji: "🧊", type: "cold", strength: 15 },
                    "TIME": { emoji: "⏳", type: "abstract", strength: 500 }
                };

                if (library[n]) return library[n];

                // Generic generator for unknown items
                return {
                    emoji: "❓",
                    type: "unknown",
                    strength: n.length * 2 
                };
            }

            // The Core Battle Logic
            doesABeatB(aName, bName) {
                const a = this.getItemData(aName);
                const b = this.getItemData(bName);

                // Check for duplicate words (illegal)
                if (aName === bName) return { win: false, reason: "You can't use the same thing!" };

                // Hardcoded Classic Rules
                if (aName === "PAPER" && bName === "ROCK") return { win: true, reason: "Paper covers Rock!" };
                if (aName === "SCISSORS" && bName === "PAPER") return { win: true, reason: "Scissors cut Paper!" };
                if (aName === "ROCK" && bName === "SCISSORS") return { win: true, reason: "Rock crushes Scissors!" };

                // Logic Based Rules
                if (a.type === "liquid" && b.type === "energy") return { win: true, reason: `${aName} extinguishes ${bName}!` };
                if (a.type === "energy" && b.type === "solid") return { win: true, reason: `${aName} melts ${bName}!` };
                if (a.type === "sharp" && b.type === "cover") return { win: true, reason: `${aName} cuts through ${bName}!` };
                if (a.type === "cosmic") return { win: true, reason: `${aName} consumes everything!` };
                if (a.type === "heavy" && b.type === "solid") return { win: true, reason: `${aName} smashes ${bName}!` };

                // Fallback Power Logic
                if (a.strength > b.strength) {
                    return { win: true, reason: `${aName} is more powerful than ${bName}!` };
                }

                return { win: false, reason: `${aName} doesn't stand a chance against ${bName}.` };
            }

            handleTurn() {
                const userInput = this.inputEl.value.toUpperCase().trim();
                if (!userInput) return;

                const result = this.doesABeatB(userInput, this.currentItem);

                if (result.win) {
                    this.score++;
                    this.messageEl.innerText = result.reason;
                    this.currentItem = userInput;
                    const data = this.getItemData(userInput);
                    this.currentEmoji = data.emoji;
                    
                    this.flashEffect('win-flash');
                    this.updateScore();
                } else {
                    this.messageEl.innerText = `GAME OVER! ${result.reason}`;
                    this.flashEffect('lose-flash');
                    this.shakeEffect();
                    this.resetGame();
                }

                this.history.push(`${userInput} > ${this.currentItem}`);
                this.updateDisplay();
                this.inputEl.value = "";
            }

            updateScore() {
                this.scoreEl.innerText = this.score;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    this.highScoreEl.innerText = this.highScore;
                    localStorage.setItem('wbr_highScore', this.highScore);
                }
            }

            updateDisplay() {
                this.targetNameEl.innerText = this.currentItem;
                this.targetEmojiEl.innerText = this.currentEmoji;
                this.historyEl.innerText = this.history.slice(-5).join(" | ");
            }

            flashEffect(className) {
                this.displayBox.classList.add(className);
                setTimeout(() => {
                    this.displayBox.classList.remove(className);
                }, 300);
            }

            shakeEffect() {
                this.displayBox.classList.add('shake');
                setTimeout(() => {
                    this.displayBox.classList.remove('shake');
                }, 500);
            }

            resetGame() {
                this.score = 0;
                this.scoreEl.innerText = "0";
                this.currentItem = "ROCK";
                this.currentEmoji = "🪨";
                this.history = [];
            }
        }

        // Start the game instance
        const game = new WhatBeatsRock();
    </script>
</body>
</html>
