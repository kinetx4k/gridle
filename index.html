<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror House Experience</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10vw;
        }

        /* Main Menu Styles */
        .menu-item {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            pointer-events: auto;
            text-shadow: 2px 2px 0px #000;
            transition: color 0.2s, transform 0.2s;
            width: fit-content;
        }

        .menu-item:hover {
            color: #ff0000;
            transform: scale(1.1) translateX(20px);
        }

        #menuTitle {
            font-size: 2rem;
            margin-bottom: 50px;
            color: #aaa;
            pointer-events: none;
        }

        /* Game UI Styles */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 3;
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            display: none;
            z-index: 3;
            text-align: center;
        }

        #overlayScreens {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #555;
            display: none;
            z-index: 10;
            text-align: center;
            pointer-events: auto;
        }

        .close-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.2rem;
        }
        
        .close-btn:hover {
            background: #ff0000;
        }
    </style>
    <!-- Importing Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- WebGL Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Elements -->
    <div id="uiLayer">
        <div id="menuTitle">You think you can<br>just leave our game?</div>
        <div class="menu-item" id="btnStart" onmouseover="aimAt(0)" onclick="startGame()">Start</div>
        <div class="menu-item" id="btnOptions" onmouseover="aimAt(1)" onclick="showScreen('Options')">Options</div>
        <div class="menu-item" id="btnCredits" onmouseover="aimAt(2)" onclick="showScreen('Credits')">Credits</div>
        <div class="menu-item" id="btnExit" onmouseover="aimAt(3)" onclick="showScreen('Exit')">Exit</div>
    </div>

    <!-- In-Game UI -->
    <div id="crosshair"></div>
    <div id="instruction">Click to Lock Mouse<br>WASD to Move, SPACE to Jump (Very Slow)</div>

    <!-- Overlay Screens (Options/Credits) -->
    <div id="overlayScreens">
        <h2 id="overlayTitle">Title</h2>
        <p id="overlayContent">Content goes here.</p>
        <button class="close-btn" onclick="closeScreen()">Back</button>
    </div>

    <script>
        // --- GLOBAL VARIABLES & STATE ---
        let gameState = 'MENU'; // 'MENU' or 'GAME'
        let renderer, cameraMenu, cameraGame, sceneMenu, sceneGame;
        let lumberjack, rightArm, laser;
        let lastTime = performance.now();
        
        // Physics & Input
        let keys = { w: false, a: false, s: false, d: false, space: false };
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let isGrounded = false;
        const gravity = -3.0; // Low gravity for floating feel
        
        // User requested very slow movement
        const moveSpeed = 15.0; 
        const jumpVelocity = 2.0; 
        
        // Collision Boxes
        const colliders = [];

        // Mouse look variables
        let pitch = new THREE.Object3D();
        let yaw = new THREE.Object3D();
        const PI_2 = Math.PI / 2;

        // Variablen für das komplexe Zielen der Waffe
        let targetAim = new THREE.Vector3(-4, 5, 0); // Standardziel
        const dummyArm = new THREE.Object3D();

        init();
        animate();

        function init() {
            // Setup Renderer
            const canvas = document.getElementById('gameCanvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;

            // --- SETUP MENU SCENE ---
            sceneMenu = new THREE.Scene();
            sceneMenu.background = new THREE.Color(0x050505);
            sceneMenu.fog = new THREE.FogExp2(0x050505, 0.05);

            cameraMenu = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            cameraMenu.position.set(0, 4, 10);
            cameraMenu.lookAt(0, 3, 0);

            // Menu Lighting
            const ambLightMenu = new THREE.AmbientLight(0x202020);
            sceneMenu.add(ambLightMenu);
            const dirLightMenu = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLightMenu.position.set(5, 10, 5);
            dirLightMenu.castShadow = true;
            sceneMenu.add(dirLightMenu);
            const redGlow = new THREE.PointLight(0xff0000, 1, 10);
            redGlow.position.set(-2, 3, 2);
            sceneMenu.add(redGlow);

            // Ground for Menu
            const planeGeoMenu = new THREE.PlaneGeometry(100, 100);
            const planeMatMenu = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            const planeMenu = new THREE.Mesh(planeGeoMenu, planeMatMenu);
            planeMenu.rotation.x = -Math.PI / 2;
            planeMenu.receiveShadow = true;
            sceneMenu.add(planeMenu);

            buildMenuCharacter();

            // --- SETUP GAME SCENE (HORROR HOUSE) ---
            sceneGame = new THREE.Scene();
            sceneGame.background = new THREE.Color(0x000000); // Pitch black
            // Eerie fog
            sceneGame.fog = new THREE.Fog(0x000000, 1, 25);

            cameraGame = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            // Custom First Person Controls setup
            yaw.position.set(0, 3, 0); // Player height
            sceneGame.add(yaw);
            yaw.add(pitch);
            pitch.add(cameraGame);

            // Game Lighting
            const ambLightGame = new THREE.AmbientLight(0x020205); // Almost no ambient light
            sceneGame.add(ambLightGame);

            // Flashlight attached to camera
            const flashlight = new THREE.SpotLight(0xfff0dd, 2, 40, Math.PI / 6, 0.5, 1);
            flashlight.position.set(0, 0, 0);
            flashlight.target.position.set(0, 0, -1);
            flashlight.castShadow = true;
            flashlight.shadow.mapSize.width = 1024;
            flashlight.shadow.mapSize.height = 1024;
            pitch.add(flashlight);
            pitch.add(flashlight.target);

            buildHorrorHouse();

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onDocumentMouseMove, false);
            
            // Pointer Lock Event Listeners
            document.addEventListener('click', requestPointerLock);
            document.addEventListener('pointerlockchange', onPointerLockChange);

            // Keyboard Listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
        }

        // --- PROCEDURAL TEXTURES ---
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#3d2817';
            ctx.fillRect(0, 0, 256, 256);
            for(let i=0; i<100; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#2c1c0f' : '#4d3521';
                ctx.fillRect(Math.random()*256, 0, Math.random()*5+1, 256);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(10, 10);
            return tex;
        }

        function createWallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, 128, 128);
            // Grimy pattern
            for(let i=0; i<500; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.3})`;
                ctx.beginPath();
                ctx.arc(Math.random()*128, Math.random()*128, Math.random()*5, 0, Math.PI*2);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(4, 2);
            return tex;
        }

        function createPlaidTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#aa0000';
            ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#222222';
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillRect(32, 32, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        // --- MENU CHARACTER (LUMBERJACK) ---
        function buildMenuCharacter() {
            lumberjack = new THREE.Group();
            
            const matJeans = new THREE.MeshStandardMaterial({ color: 0x1f3b5c });
            const matSkin = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const matPlaid = new THREE.MeshStandardMaterial({ map: createPlaidTexture() });
            const matHat = new THREE.MeshStandardMaterial({ color: 0x880000 });
            const matGun = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });

            // Torso
            const torsoGeo = new THREE.BoxGeometry(1.2, 1.5, 0.6);
            const torso = new THREE.Mesh(torsoGeo, matPlaid);
            torso.position.y = 2.5;
            torso.castShadow = true;
            lumberjack.add(torso);

            // Head
            const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const head = new THREE.Mesh(headGeo, matSkin);
            head.position.y = 3.8;
            head.castShadow = true;
            lumberjack.add(head);

            // Hat
            const hatGeo = new THREE.BoxGeometry(0.85, 0.2, 1.0);
            const hat = new THREE.Mesh(hatGeo, matHat);
            hat.position.y = 4.25;
            hat.position.z = 0.1;
            hat.castShadow = true;
            lumberjack.add(hat);

            // Legs
            const legGeo = new THREE.BoxGeometry(0.5, 1.8, 0.5);
            const leftLeg = new THREE.Mesh(legGeo, matJeans);
            leftLeg.position.set(-0.3, 0.9, 0);
            leftLeg.castShadow = true;
            lumberjack.add(leftLeg);

            const rightLeg = new THREE.Mesh(legGeo, matJeans);
            rightLeg.position.set(0.3, 0.9, 0);
            rightLeg.castShadow = true;
            lumberjack.add(rightLeg);

            // Left Arm
            const armGeo = new THREE.BoxGeometry(0.4, 1.4, 0.4);
            const leftArm = new THREE.Mesh(armGeo, matPlaid);
            leftArm.position.set(-0.8, 2.5, 0);
            leftArm.castShadow = true;
            lumberjack.add(leftArm);

            // Right Arm (Aims the gun)
            rightArm = new THREE.Group();
            rightArm.position.set(0.8, 3.0, 0); // Pivot at shoulder
            
            const rightArmMesh = new THREE.Mesh(armGeo, matPlaid);
            rightArmMesh.position.set(0, -0.5, 0.5); // Extend forward
            rightArmMesh.rotation.x = -Math.PI / 2;
            rightArmMesh.castShadow = true;
            rightArm.add(rightArmMesh);

            // Gun
            const gunGeo = new THREE.BoxGeometry(0.2, 0.3, 1.0);
            const gun = new THREE.Mesh(gunGeo, matGun);
            gun.position.set(0, -0.5, 1.2);
            gun.castShadow = true;
            rightArm.add(gun);

            // Laser Pointer
            const laserMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const laserGeo = new THREE.CylinderGeometry(0.02, 0.02, 50, 8);
            laserGeo.translate(0, 25, 0); // Move origin to base
            laser = new THREE.Mesh(laserGeo, laserMat);
            laser.rotation.x = Math.PI / 2;
            laser.position.set(0, -0.5, 1.5); // End of gun
            rightArm.add(laser);

            lumberjack.add(rightArm);
            lumberjack.position.set(3, 0, 0); // Stand to the right
            lumberjack.rotation.y = -0.5; // Angle slightly towards center
            sceneMenu.add(lumberjack);
        }

        // --- HORROR HOUSE GENERATOR ---
        function buildHorrorHouse() {
            // Materials
            const woodMat = new THREE.MeshStandardMaterial({ 
                map: createWoodTexture(), 
                roughness: 0.9 
            });
            const wallMat = new THREE.MeshStandardMaterial({ 
                map: createWallTexture(), 
                roughness: 1.0 
            });
            const ceilingMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                roughness: 1.0 
            });

            // Complex layout data (x, z, width, depth)
            const floorPlan = [
                {x: 0, z: 0, w: 40, d: 40} // Main large floor
            ];

            const walls = [
                // Outer Walls
                {x: 0, z: -20, w: 40, d: 1}, // North
                {x: 0, z: 20, w: 40, d: 1},  // South
                {x: -20, z: 0, w: 1, d: 40}, // West
                {x: 20, z: 0, w: 1, d: 40},  // East
                
                // Inner Walls (Creating rooms and hallways)
                {x: -5, z: -10, w: 10, d: 1}, 
                {x: -10, z: -5, w: 1, d: 10},
                {x: 10, z: 0, w: 1, d: 20},
                {x: 0, z: 10, w: 20, d: 1}
            ];

            // Build Floor
            floorPlan.forEach(f => {
                const geo = new THREE.BoxGeometry(f.w, 1, f.d);
                const mesh = new THREE.Mesh(geo, woodMat);
                mesh.position.set(f.x, -0.5, f.z);
                mesh.receiveShadow = true;
                sceneGame.add(mesh);
            });

            // Build Ceiling
            const ceilGeo = new THREE.BoxGeometry(40, 1, 40);
            const ceilMesh = new THREE.Mesh(ceilGeo, ceilingMat);
            ceilMesh.position.set(0, 10.5, 0);
            ceilMesh.receiveShadow = true;
            sceneGame.add(ceilMesh);

            // Build Walls & Add to Colliders
            const wallHeight = 10;
            walls.forEach(w => {
                const geo = new THREE.BoxGeometry(w.w, wallHeight, w.d);
                const mesh = new THREE.Mesh(geo, wallMat);
                mesh.position.set(w.x, wallHeight / 2, w.z);
                mesh.receiveShadow = true;
                mesh.castShadow = true;
                sceneGame.add(mesh);

                // Add to custom collision engine
                const box = new THREE.Box3().setFromObject(mesh);
                colliders.push(box);
            });

            // Add some creepy furniture (boxes)
            const furnitureMat = new THREE.MeshStandardMaterial({color: 0x332211, roughness: 0.8});
            
            // A table
            const tableGeo = new THREE.BoxGeometry(4, 0.2, 2);
            const table = new THREE.Mesh(tableGeo, furnitureMat);
            table.position.set(0, 2.5, -15);
            table.castShadow = true; table.receiveShadow = true;
            sceneGame.add(table);
            colliders.push(new THREE.Box3().setFromObject(table));

            // Table legs
            for(let i=-1; i<=1; i+=2) {
                for(let j=-1; j<=1; j+=2) {
                    const legGeo = new THREE.BoxGeometry(0.2, 2.5, 0.2);
                    const leg = new THREE.Mesh(legGeo, furnitureMat);
                    leg.position.set(i*1.8, 1.25, -15 + j*0.8);
                    leg.castShadow = true;
                    sceneGame.add(leg);
                    colliders.push(new THREE.Box3().setFromObject(leg));
                }
            }

            // A creepy painting on the wall
            const paintingGeo = new THREE.PlaneGeometry(3, 4);
            const paintingMat = new THREE.MeshStandardMaterial({color: 0x110000, roughness: 0.5});
            const painting = new THREE.Mesh(paintingGeo, paintingMat);
            painting.position.set(-4.9, 5, -10.1);
            painting.rotation.y = Math.PI; // Face outwards
            sceneGame.add(painting);
        }

        // --- INPUT HANDLING ---
        function onDocumentMouseMove(event) {
            if (gameState === 'GAME' && document.pointerLockElement === document.body) {
                // First person mouse look
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

                yaw.rotation.y -= movementX * 0.002;
                pitch.rotation.x -= movementY * 0.002;

                // Clamp pitch
                pitch.rotation.x = Math.max(-PI_2 + 0.1, Math.min(PI_2 - 0.1, pitch.rotation.x));
            }
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW': keys.w = true; break;
                case 'KeyA': keys.a = true; break;
                case 'KeyS': keys.s = true; break;
                case 'KeyD': keys.d = true; break;
                case 'Space': 
                    if (isGrounded && gameState === 'GAME') {
                        velocity.y = jumpVelocity; 
                        isGrounded = false;
                    }
                    break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': keys.w = false; break;
                case 'KeyA': keys.a = false; break;
                case 'KeyS': keys.s = false; break;
                case 'KeyD': keys.d = false; break;
            }
        }

        function requestPointerLock() {
            if (gameState === 'GAME') {
                document.body.requestPointerLock();
            }
        }

        function onPointerLockChange() {
            if (document.pointerLockElement === document.body) {
                document.getElementById('instruction').style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
            } else {
                if (gameState === 'GAME') {
                    document.getElementById('instruction').style.display = 'block';
                    document.getElementById('crosshair').style.display = 'none';
                }
            }
        }

        // --- MENU LOGIC ---
        function aimAt(index) {
            // Helper for mouse hover simulating the laser pointing
            if (gameState !== 'MENU') return;
            
            // Zielkoordinaten für die Menüpunkte im 3D Raum
            if (index === 0) targetAim.set(-4, 4.5, 0); // Start
            else if (index === 1) targetAim.set(-4, 3, 0); // Options
            else if (index === 2) targetAim.set(-4, 1.5, 0); // Credits
            else if (index === 3) targetAim.copy(cameraMenu.position); // Exit - Waffe zielt auf die Kamera!
        }

        function startGame() {
            gameState = 'GAME';
            document.getElementById('uiLayer').style.display = 'none';
            document.getElementById('instruction').style.display = 'block';
            yaw.position.set(0, 3, 0); // Reset player position
            velocity.set(0,0,0);
            
            // Try to lock pointer immediately
            document.body.requestPointerLock();
        }

        function showScreen(type) {
            const overlay = document.getElementById('overlayScreens');
            const title = document.getElementById('overlayTitle');
            const content = document.getElementById('overlayContent');
            
            overlay.style.display = 'block';
            title.innerText = type;
            
            if (type === 'Options') {
                content.innerHTML = "Movement: WASD<br>Jump: Space<br>Look: Mouse<br><br>The game is intentionally very slow.";
            } else if (type === 'Credits') {
                content.innerHTML = "Created by AI.<br>Inspired by classic horror indies.<br>No monsters included.";
            } else if (type === 'Exit') {
                content.innerHTML = "You can't exit.<br>The house is waiting.";
            }
        }

        function closeScreen() {
            document.getElementById('overlayScreens').style.display = 'none';
        }

        function onWindowResize() {
            cameraMenu.aspect = window.innerWidth / window.innerHeight;
            cameraMenu.updateProjectionMatrix();
            cameraGame.aspect = window.innerWidth / window.innerHeight;
            cameraGame.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- COLLISION DETECTION ---
        function checkCollisions(proposedPos) {
            // Player bounding box (slim vertical cylinder roughly)
            const playerBox = new THREE.Box3();
            const size = 0.8; // Player radius
            playerBox.min.set(proposedPos.x - size/2, proposedPos.y - 2, proposedPos.z - size/2);
            playerBox.max.set(proposedPos.x + size/2, proposedPos.y + 1, proposedPos.z + size/2);

            for (let i = 0; i < colliders.length; i++) {
                if (playerBox.intersectsBox(colliders[i])) {
                    return true;
                }
            }
            return false;
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - lastTime) / 1000;
            lastTime = time;

            if (gameState === 'MENU') {
                // Small breathing animation for lumberjack
                lumberjack.position.y = Math.sin(time * 0.002) * 0.05;

                // Komplexe Zielverfolgung für die Waffe und den Laserpointer
                const worldPos = new THREE.Vector3();
                rightArm.getWorldPosition(worldPos);
                dummyArm.position.copy(worldPos);
                dummyArm.lookAt(targetAim);
                
                // Rotation umrechnen und flüssig anwenden
                const invParentQuat = lumberjack.quaternion.clone().invert();
                const targetQuat = dummyArm.quaternion.clone().premultiply(invParentQuat);
                
                rightArm.quaternion.slerp(targetQuat, 0.1);

                renderer.render(sceneMenu, cameraMenu);
            } 
            else if (gameState === 'GAME') {
                // Physics and Movement (Very slow as requested)
                velocity.x -= velocity.x * 10.0 * delta; // Friction
                velocity.z -= velocity.z * 10.0 * delta;

                velocity.y += gravity * delta; // Apply gravity

                direction.z = Number(keys.w) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize(); // consistent speed in all directions

                if (keys.w || keys.s) velocity.z -= direction.z * moveSpeed * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * moveSpeed * delta;

                // Calculate proposed movement
                const controlObject = yaw;
                
                // Right vector
                const right = new THREE.Vector3(1, 0, 0);
                right.applyQuaternion(controlObject.quaternion);
                
                // Forward vector
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(controlObject.quaternion);

                // XZ movement application
                const moveX = right.x * velocity.x * delta + forward.x * velocity.z * delta;
                const moveZ = right.z * velocity.x * delta + forward.z * velocity.z * delta;

                // Collision Check X
                let proposedPos = controlObject.position.clone();
                proposedPos.x += moveX;
                if (!checkCollisions(proposedPos)) {
                    controlObject.position.x += moveX;
                } else {
                    velocity.x = 0;
                }

                // Collision Check Z
                proposedPos = controlObject.position.clone();
                proposedPos.z += moveZ;
                if (!checkCollisions(proposedPos)) {
                    controlObject.position.z += moveZ;
                } else {
                    velocity.z = 0;
                }

                // Apply Y movement (Jumping/Gravity)
                controlObject.position.y += velocity.y * delta;

                if (controlObject.position.y < 3) {
                    velocity.y = 0;
                    controlObject.position.y = 3;
                    isGrounded = true;
                }

                // Head bobbing effect to make slow walking feel heavier
                if ((keys.w || keys.a || keys.s || keys.d) && isGrounded) {
                    pitch.position.y = Math.sin(time * 0.005) * 0.05;
                } else {
                    pitch.position.y = 0;
                }

                renderer.render(sceneGame, cameraGame);
            }
        }
    </script>
</body>
</html>
