<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDLE - Guess the Country</title>
    <style>
        :root {
            --bg-color: #0b1322;
            --text-color: #ffffff;
            --primary-green: #7eb342;
            --secondary-bg: #1a2a44;
            --border-color: #2c3e50;
            --highlight-color: #3498db;
            --guess-bar-bg: #2d384d;
            --empty-slot-bg: #162235;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo span { color: var(--primary-green); }

        .header-icons {
            display: flex;
            gap: 15px;
            cursor: pointer;
            font-size: 20px;
        }

        /* --- Game Area --- */
        .game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        /* Date/Mode Nav */
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        .selector-box {
            background: var(--secondary-bg);
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 0.8;
            justify-content: center;
        }

        .nav-arrow {
            background: #2d384d;
            color: #5d6d7e;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Silhouette */
        .silhouette-box {
            width: 250px;
            height: 250px;
            background-color: white;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            margin: 10px 0;
        }

        /* Input Area */
        .input-group {
            width: 100%;
            display: flex;
            gap: 10px;
            position: relative;
        }

        #guess-input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--primary-green);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            font-size: 16px;
        }

        .btn-guess {
            background-color: #f8f9fa;
            color: #2c3e50;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #autocomplete-list {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            border-radius: 8px 8px 0 0;
        }

        .autocomplete-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #2c3e50; }
        .autocomplete-item:hover, .autocomplete-item.active { background: var(--highlight-color); }

        /* --- Guesses (The Pills) --- */
        .guesses-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .guess-data-row {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        .pill {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .pill-name { flex: 2.5; }
        .pill-dist { flex: 1.5; }
        .pill-dir { flex: 0.8; background: #3498db; color: white; border: none; }
        .pill-prox { flex: 1; }

        /* --- Counter & Slots --- */
        .status-bar {
            width: 100%;
            height: 38px;
            background: var(--guess-bar-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            color: #bdc3c7;
            letter-spacing: 1px;
        }

        .empty-slot {
            width: 100%;
            height: 14px;
            background: var(--empty-slot-bg);
            border-radius: 10px;
            opacity: 0.6;
        }

        /* --- Modals --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100; justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--secondary-bg);
            width: 90%; max-width: 450px;
            padding: 25px; border-radius: 15px;
            position: relative; max-height: 85vh; overflow-y: auto;
        }

        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .stat-box { text-align: center; }
        .stat-box .v { font-size: 22px; font-weight: bold; }
        .stat-box .l { font-size: 10px; color: #999; text-transform: uppercase; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .cal-day { padding: 8px; background: #2c3e50; text-align: center; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .cal-day.today { border: 2px solid var(--primary-green); }

        .footer { margin-top: auto; padding: 25px; text-align: center; font-size: 13px; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="header-icons" onclick="toggleModal('modal-help')">👤</div>
        <div class="logo">🌍 WOR<span>L</span>DLE</div>
        <div class="header-icons">
            <span onclick="toggleModal('modal-stats')">📊</span>
            <span onclick="toggleModal('modal-settings')">≡</span>
        </div>
    </header>

    <div class="game-container">
        <div class="nav-controls">
            <button class="nav-arrow" onclick="changeDay(-1)">◀</button>
            <div class="selector-box">🎉 Country ▾</div>
            <button class="nav-arrow" onclick="changeDay(1)">▶</button>
        </div>

        <div id="silhouette" class="silhouette-box"></div>

        <div class="input-group">
            <input type="text" id="guess-input" placeholder="Country, territory..." autocomplete="off">
            <button class="btn-guess" onclick="makeGuess()">🌐 Guess</button>
            <div id="autocomplete-list"></div>
        </div>

        <div class="guesses-container" id="guesses-list">
            <!-- Dynamic rows will appear here -->
        </div>

        <div id="status-bar-container" style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
            <div class="status-bar" id="guess-counter-bar">GUESS 1 / 6</div>
            <div class="empty-slot"></div>
            <div class="empty-slot"></div>
            <div class="empty-slot"></div>
            <div class="empty-slot"></div>
            <div class="empty-slot"></div>
        </div>
    </div>

    <div class="footer">
        WORLDLE - Guess the Country | Daily Geography Game
    </div>

    <!-- Modals (Help, Stats, Settings) -->
    <div id="modal-help" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('modal-help')">&times;</span>
            <h2>How to play</h2>
            <p style="margin: 10px 0;">Guess the WORLDLE in 6 guesses.</p>
            <hr style="border: 0.5px solid #444; margin: 15px 0;">
            <p>Example:</p>
            <div class="guess-data-row" style="margin-top: 10px;">
                <div class="pill pill-name">AUSTRIA</div>
                <div class="pill pill-dist">0km</div>
                <div class="pill pill-dir" style="background:#27ae60">🎉</div>
                <div class="pill pill-prox">100%</div>
            </div>
            <p style="font-size: 12px; margin-top:10px; color: #999;">Correct! The target was Austria.</p>
        </div>
    </div>

    <div id="modal-stats" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('modal-stats')">&times;</span>
            <h2>Statistics</h2>
            <div class="stats-grid" id="stats-view">
                <div class="stat-box"><div class="v" id="s-p">0</div><div class="l">Played</div></div>
                <div class="stat-box"><div class="v" id="s-w">0%</div><div class="l">Win %</div></div>
                <div class="stat-box"><div class="v" id="s-s">0</div><div class="l">Streak</div></div>
                <div class="stat-box"><div class="v" id="s-m">0</div><div class="l">Max</div></div>
            </div>
            <h3>Archive</h3>
            <div class="calendar-grid" id="calendar"></div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('modal-settings')">&times;</span>
            <h2>Settings</h2>
            <div style="padding: 20px 0; display:flex; justify-content:space-between; align-items:center;">
                <span>Practice Mode (Infinite)</span>
                <input type="checkbox" id="practice-check" onchange="togglePractice()" style="width:20px; height:20px;">
            </div>
        </div>
    </div>

    <script>
        // --- Game Data ---
        const countries = [
            { name: "Austria", lat: 47.516, lon: 14.550, svg: "https://upload.wikimedia.org/wikipedia/commons/4/41/Austria_location_map.svg" },
            { name: "Nigeria", lat: 9.082, lon: 8.675, svg: "https://upload.wikimedia.org/wikipedia/commons/2/23/Nigeria_location_map.svg" },
            { name: "Botswana", lat: -22.328, lon: 24.684, svg: "https://upload.wikimedia.org/wikipedia/commons/7/71/Botswana_location_map.svg" },
            { name: "Germany", lat: 51.165, lon: 10.451, svg: "https://upload.wikimedia.org/wikipedia/commons/e/e3/Germany_location_map.svg" },
            { name: "Japan", lat: 36.204, lon: 138.252, svg: "https://upload.wikimedia.org/wikipedia/commons/2/24/Japan_location_map.svg" },
            { name: "Brazil", lat: -14.235, lon: -51.925, svg: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Brazil_location_map.svg" },
            { name: "Canada", lat: 56.130, lon: -106.346, svg: "https://upload.wikimedia.org/wikipedia/commons/6/67/Canada_location_map.svg" }
        ];

        let state = {
            date: new Date(),
            target: null,
            guesses: [],
            isGameOver: false,
            isPractice: false,
            stats: JSON.parse(localStorage.getItem('w_stats')) || { p: 0, w: 0, s: 0, m: 0, d: [0,0,0,0,0,0] }
        };

        // --- Logic ---

        function init() {
            const dayIdx = Math.floor(state.date.getTime() / 86400000) % countries.length;
            state.target = state.isPractice ? countries[Math.floor(Math.random() * countries.length)] : countries[dayIdx];
            
            document.getElementById('silhouette').style.webkitMaskImage = `url('${state.target.svg}')`;
            document.getElementById('silhouette').style.maskImage = `url('${state.target.svg}')`;
            
            state.guesses = [];
            state.isGameOver = false;
            document.getElementById('guesses-list').innerHTML = '';
            refreshUI();
            renderCalendar();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function getDirEmoji(lat1, lon1, lat2, lon2) {
            if (lat1 === lat2 && lon1 === lon2) return "🎉";
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
            const brng = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            return ["⬆️","↗️","➡️","↘️","⬇️","↙️","⬅️","↖️","⬆️"][Math.round(brng/45)];
        }

        function makeGuess() {
            if (state.isGameOver) return;
            const input = document.getElementById('guess-input');
            const country = countries.find(c => c.name.toLowerCase() === input.value.trim().toLowerCase());
            
            if (!country || state.guesses.some(g => g.name === country.name)) return;

            const d = calculateDistance(country.lat, country.lon, state.target.lat, state.target.lon);
            const dir = getDirEmoji(country.lat, country.lon, state.target.lat, state.target.lon);
            const prox = Math.max(0, 100 - Math.round((d / 20000) * 100));

            const g = { name: country.name, dist: d, dir: dir, prox: prox };
            state.guesses.push(g);
            renderGuess(g);
            input.value = '';
            
            if (country.name === state.target.name) end(true);
            else if (!state.isPractice && state.guesses.length >= 6) end(false);
            
            refreshUI();
        }

        function renderGuess(g) {
            const row = document.createElement('div');
            row.className = 'guess-data-row';
            row.innerHTML = `
                <div class="pill pill-name">${g.name.toUpperCase()}</div>
                <div class="pill pill-dist">${g.dist.toLocaleString()}km</div>
                <div class="pill pill-dir">${g.dir}</div>
                <div class="pill pill-prox">${g.prox}%</div>
            `;
            document.getElementById('guesses-list').appendChild(row);
        }

        function refreshUI() {
            const count = state.isPractice ? "∞" : "6";
            const current = state.guesses.length + (state.isGameOver ? 0 : 1);
            document.getElementById('guess-counter-bar').innerText = `GUESS ${current} / ${count}`;
            
            // Render empty slots
            const container = document.getElementById('status-bar-container');
            const existingSlots = container.querySelectorAll('.empty-slot');
            existingSlots.forEach(s => s.remove());
            
            if (!state.isPractice) {
                const remaining = 6 - state.guesses.length - (state.isGameOver ? 0 : 1);
                for(let i=0; i<remaining; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'empty-slot';
                    container.appendChild(slot);
                }
            }
            
            // Stats UI
            document.getElementById('s-p').innerText = state.stats.p;
            document.getElementById('s-w').innerText = (state.stats.p ? Math.round(state.stats.w/state.stats.p*100) : 0) + "%";
            document.getElementById('s-s').innerText = state.stats.s;
            document.getElementById('s-m').innerText = state.stats.m;
        }

        function end(win) {
            state.isGameOver = true;
            if (!state.isPractice) {
                state.stats.p++;
                if (win) {
                    state.stats.w++; state.stats.s++;
                    state.stats.m = Math.max(state.stats.s, state.stats.m);
                    state.stats.d[state.guesses.length-1]++;
                } else state.stats.s = 0;
                localStorage.setItem('w_stats', JSON.stringify(state.stats));
            }
            setTimeout(() => alert(win ? "Correct! 🏆" : "Game Over! It was " + state.target.name), 200);
        }

        // --- UI Utils ---
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function togglePractice() {
            state.isPractice = document.getElementById('practice-check').checked;
            init();
        }

        function changeDay(n) {
            if (state.isPractice) return;
            state.date.setDate(state.date.getDate() + n);
            init();
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const t = new Date();
            for(let i=-13; i<=0; i++) {
                const d = new Date(t); d.setDate(d.getDate()+i);
                const el = document.createElement('div');
                el.className = `cal-day ${i===0?'today':''}`;
                el.innerText = d.getDate();
                el.onclick = () => { state.date = d; state.isPractice = false; toggleModal('modal-stats'); init(); };
                cal.appendChild(el);
            }
        }

        // --- Controls (WASD & Space) ---
        const input = document.getElementById('guess-input');
        input.addEventListener('input', () => {
            const list = document.getElementById('autocomplete-list');
            const val = input.value.toLowerCase();
            list.innerHTML = '';
            if (!val) { list.style.display='none'; return; }
            const filtered = countries.filter(c => c.name.toLowerCase().includes(val));
            filtered.forEach((c, i) => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item' + (i===0?' active':'');
                item.innerText = c.name;
                item.onclick = () => { input.value = c.name; list.style.display='none'; makeGuess(); };
                list.appendChild(item);
            });
            list.style.display = filtered.length ? 'block' : 'none';
        });

        document.addEventListener('keydown', (e) => {
            const list = document.getElementById('autocomplete-list');
            const items = list.querySelectorAll('.autocomplete-item');
            let active = list.querySelector('.active');
            let idx = Array.from(items).indexOf(active);

            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (idx > 0) { active.classList.remove('active'); items[idx-1].classList.add('active'); }
            } else if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') {
                e.preventDefault();
                if (idx < items.length-1) { active.classList.remove('active'); items[idx+1].classList.add('active'); }
            } else if (e.key === ' ' || e.key === 'Enter') {
                if (active && list.style.display !== 'none') { e.preventDefault(); active.click(); }
                else if (document.activeElement !== input) { e.preventDefault(); input.focus(); }
            }
        });

        init();
    </script>
</body>
</html>
