<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.00 Cookies - Cookie Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap');

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.5s ease;
            position: relative;
        }

        body.golden-frenzy {
            background-color: #433200;
            background-image: 
                radial-gradient(circle, #b8860b44 0%, #1a1a1a 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='100' r='90' fill='%23ffd700' fill-opacity='0.1' /%3E%3Ccircle cx='60' cy='60' r='10' fill='%23d4af37' fill-opacity='0.1' /%3E%3Ccircle cx='140' cy='140' r='10' fill='%23d4af37' fill-opacity='0.1' /%3E%3C/svg%3E");
            animation: frenzy-bg-slide 10s linear infinite;
        }

        @keyframes frenzy-bg-slide {
            from { background-position: 0 0; }
            to { background-position: 300px 300px; }
        }

        .cookie-container {
            perspective: 1000px;
        }

        #main-cookie {
            transition: transform 0.1s ease-in-out;
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(210, 105, 30, 0.4));
        }

        #main-cookie:hover {
            transform: scale(1.05);
        }

        #main-cookie:active {
            transform: scale(0.95);
        }

        @keyframes wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        #main-cookie.shaking {
            animation: wobble 0.1s infinite;
            filter: drop-shadow(0 0 30px #ffd700);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fly-up 1s ease-out forwards;
            font-weight: bold;
            z-index: 200;
        }

        @keyframes fly-up {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1.5); opacity: 0; }
        }

        .upgrade-card {
            background: #2a2a2a;
            border: 2px solid #3a3a3a;
            transition: all 0.2s;
        }

        .upgrade-card:hover:not(.disabled) {
            background: #3a3a3a;
            border-color: #d2691e;
            transform: translateX(-5px);
        }

        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
            grayscale: 1;
        }

        .scroller::-webkit-scrollbar {
            width: 8px;
        }

        .scroller::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .scroller::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .floating-cookie {
            position: absolute;
            pointer-events: none;
            z-index: 50;
            animation: cookie-float 2s linear forwards;
        }

        @keyframes cookie-float {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(360deg); opacity: 0; }
        }

        .stats-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        #frenzy-meter-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 24px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            z-index: 100;
        }

        #frenzy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            transition: width 0.1s linear;
        }

        .multiplier-tag {
            position: absolute;
            right: 10px;
            top: 0;
            font-weight: bold;
            font-size: 14px;
            line-height: 24px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Special Cookie Physics Elements */
        .special-cookie-wrapper {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 150;
            pointer-events: none;
        }

        .special-cookie-hitbox {
            width: 100%;
            height: 100%;
            cursor: pointer;
            pointer-events: auto;
            position: relative;
        }

        .golden-cookie { filter: drop-shadow(0 0 15px #ffd700); }
        .blue-cookie { filter: drop-shadow(0 0 15px #00aaff); }
        .green-cookie { filter: drop-shadow(0 0 15px #00ff44); }

        .countdown-text {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        .wings {
            position: absolute;
            top: 0;
            left: -20px;
            width: 100px;
            height: 40px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .wings-visible {
            opacity: 1;
        }

        @keyframes flap {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-20deg); }
            100% { transform: rotate(0deg); }
        }

        .wing-left {
            transform-origin: right center;
            animation: flap 0.2s ease-in-out infinite;
        }

        .wing-right {
            transform-origin: left center;
            animation: flap 0.2s ease-in-out infinite reverse;
        }

        /* Collector Bird */
        #collector-bird {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 180;
            transition: transform 0.2s linear;
            display: none;
        }

        #prestige-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 220px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
        }

        /* Tab System */
        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            color: #71717a;
            border-bottom: 2px solid #27272a;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #ffffff;
            border-bottom: 2px solid #d2691e;
            background: rgba(210, 105, 30, 0.1);
        }

        /* Custom Modal for Reset */
        #reset-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Settings Menu */
        #settings-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 500;
        }

        .settings-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 12px;
            padding: 8px;
            width: 200px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .settings-btn {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-btn:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <!-- Settings Menu Top Left -->
    <div id="settings-menu">
        <button onclick="toggleSettings()" class="bg-zinc-800/80 hover:bg-zinc-700 p-3 rounded-full border border-zinc-700 transition backdrop-blur-sm group">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:rotate-90 transition-transform duration-300"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <div id="settings-dropdown" class="settings-dropdown">
            <button onclick="saveToFile()" class="settings-btn text-white hover:text-orange-400">
                <span>💾</span> Save to file (.json)
            </button>
            <button onclick="triggerFileLoad()" class="settings-btn text-white hover:text-green-400">
                <span>📂</span> Load from file (.json)
            </button>
            <div class="h-[1px] bg-zinc-700 my-1"></div>
            <button onclick="showResetModal()" class="settings-btn text-red-400 hover:bg-red-500/10">
                <span>⚠️</span> Full Reset
            </button>
        </div>
        <input type="file" id="file-loader" class="hidden" accept=".json" onchange="loadFromFile(event)">
    </div>

    <div id="frenzy-meter-container">
        <div id="frenzy-bar"></div>
        <div id="multiplier-display" class="multiplier-tag">x1.0</div>
    </div>

    <!-- Reset Modal -->
    <div id="reset-modal">
        <div class="bg-zinc-900 p-8 rounded-2xl border-2 border-red-600 max-w-md w-full text-center shadow-2xl">
            <h2 class="text-3xl font-bold text-red-500 mb-4">DANGER! 🛑</h2>
            <p class="text-zinc-400 mb-6">This will reset EVERYTHING. Buildings, Upgrades, Cookies and Progress will be lost.</p>
            <p class="text-white font-bold mb-2">Type "CONFIRM" to proceed:</p>
            <input type="text" id="reset-confirm-input" class="w-full p-3 bg-zinc-800 border border-zinc-700 rounded-lg text-center font-bold tracking-widest outline-none focus:border-red-500 transition mb-6" placeholder="...">
            <div class="flex gap-4">
                <button onclick="closeResetModal()" class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-xl font-bold transition">CANCEL</button>
                <button onclick="executeFullReset()" class="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-bold transition">RESET ALL</button>
            </div>
        </div>
    </div>

    <div id="prestige-container">
        <div id="prestige-needed" class="text-[10px] text-orange-400 font-bold mb-1">
            Left: 100.00 B
        </div>
        <div class="flex justify-between text-[10px] mb-1">
            <span>PRESTIGE PROGRESS</span>
            <span id="prestige-percent">0%</span>
        </div>
        <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
            <div id="prestige-bar" class="bg-purple-500 h-full w-0"></div>
        </div>
        <button id="prestige-btn" onclick="prestige()" class="hidden mt-2 w-full bg-purple-600 hover:bg-purple-500 text-white text-[10px] font-bold py-1 rounded transition">
            PRESTIGE NOW!
        </button>
        <div id="current-bonus-display" class="text-[9px] text-zinc-400 mt-1">Current Bonus: +0%</div>
    </div>

    <div id="cookie-area" class="flex-1 flex flex-col items-center justify-center p-8 relative">
        <!-- The Bird -->
        <div id="collector-bird">
            <svg viewBox="0 0 100 100">
                <path d="M20 50 Q50 20 80 50 Q50 80 20 50" fill="#3b82f6" />
                <circle cx="70" cy="45" r="5" fill="white" />
                <circle cx="72" cy="45" r="2" fill="black" />
                <path d="M80 50 L90 45 L90 55 Z" fill="#fbbf24" />
                <path d="M50 50 L30 30" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round" />
                <path d="M50 50 L30 70" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round" />
            </svg>
        </div>

        <div class="text-center mb-8 z-10">
            <h1 id="cookie-count" class="text-5xl font-bold mb-2">0.00 Cookies</h1>
            <p id="cps-display" class="text-xl text-orange-400">per second: 0</p>
            <p id="click-power-display" class="text-xs text-zinc-500 mt-1">Click Power: 1</p>
        </div>

        <div class="cookie-container z-10">
            <svg id="main-cookie" width="300" height="300" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="#d2691e" />
                <circle cx="100" cy="100" r="80" fill="#cd853f" />
                <circle cx="60" cy="60" r="8" fill="#4b3621" />
                <circle cx="140" cy="70" r="10" fill="#4b3621" />
                <circle cx="80" cy="130" r="9" fill="#4b3621" />
                <circle cx="120" cy="150" r="7" fill="#4b3621" />
                <circle cx="160" cy="110" r="11" fill="#4b3621" />
                <circle cx="50" cy="110" r="8" fill="#4b3621" />
                <circle cx="100" cy="90" r="9" fill="#4b3621" />
            </svg>
        </div>

        <div id="particle-container" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <div id="shop-container" class="w-full md:w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
        <div class="p-4 stats-panel border-b border-zinc-800">
            <h2 class="text-xl font-bold mb-2 flex items-center gap-2">
                <span>🛒</span> Market
            </h2>
            <div class="flex justify-between text-[11px] text-zinc-500">
                <span>Clicks: <span id="stat-total-clicks">0</span></span>
                <span>All-time: <span id="stat-all-time">0.00</span></span>
            </div>
        </div>

        <!-- Tab Selector -->
        <div class="flex bg-zinc-950">
            <button onclick="switchTab('buildings')" id="tab-buildings" class="tab-btn active">Buildings</button>
            <button onclick="switchTab('special')" id="tab-special" class="tab-btn">Specials</button>
        </div>

        <div id="shop-items" class="flex-1 overflow-y-auto scroller p-4 space-y-3">
            <!-- Buildings are generated here -->
        </div>

        <div class="p-4 bg-zinc-800 text-center text-xs text-zinc-500">
            Developed by <a href="#" class="text-orange-400 hover:underline font-bold">kinetx</a>
        </div>
    </div>

    <script>
        /**
         * GAME STATE
         */
        let state = {
            cookies: 0.0,
            totalCookiesEarned: 0.0,
            totalClicks: 0,
            cps: 0,
            clickPower: 1, 
            lastTick: Date.now(),
            unlockedUpgrades: 1,
            clickHeat: 0,
            multiplier: 1.0,
            prestigeLevel: 0,
            prestigeBonus: 1.0, 
            goldenCookieTimer: 0,
            blueCookieSpawnTimer: 0,
            randomGoldenSpawnTimer: 0,
            activeTab: 'buildings',
            hasBird: false
        };

        const PRESTIGE_THRESHOLD = 100000000000;
        const MILESTONES = [10, 25, 50, 100, 200, 500, 1000];
        
        let keysPressed = {};

        // Buildings - Starting set
        let buildings = [
            { id: 'cursor', name: 'Cursor', description: 'Autoclicks once every 10 seconds.', basePrice: 15, baseCps: 0.1, count: 0, icon: '🖱️' },
            { id: 'grandma', name: 'Grandma', description: 'A nice grandmother to bake cookies.', basePrice: 100, baseCps: 1, count: 0, icon: '👵' },
            { id: 'farm', name: 'Farm', description: 'Grows cookie plants from seeds.', basePrice: 1100, baseCps: 8, count: 0, icon: '🌾' },
            { id: 'mine', name: 'Mine', description: 'Mines cookie dough and chocolate chips.', basePrice: 12000, baseCps: 47, count: 0, icon: '⛏️' },
            { id: 'factory', name: 'Factory', description: 'Mass produces cookies.', basePrice: 130000, baseCps: 260, count: 0, icon: '🏭' },
            { id: 'bank', name: 'Bank', description: 'Generates cookies from interest.', basePrice: 1400000, baseCps: 1400, count: 0, icon: '🏦' },
            { id: 'temple', name: 'Temple', description: 'Full of cookie gods.', basePrice: 20000000, baseCps: 7800, count: 0, icon: '🏛️' },
            { id: 'wizard', name: 'Wizard Tower', description: 'Summons cookies with magic.', basePrice: 330000000, baseCps: 44000, count: 0, icon: '🧙' },
            { id: 'ship', name: 'Shipment', description: 'Brings cookies from the cookie planet.', basePrice: 5100000000, baseCps: 260000, count: 0, icon: '🚀' },
            { id: 'alchemy', name: 'Alchemy Lab', description: 'Turns gold into cookies.', basePrice: 75000000000, baseCps: 1600000, count: 0, icon: '⚗️' },
            { id: 'portal', name: 'Portal', description: 'Opens a door to the Cookieverse.', basePrice: 1000000000000, baseCps: 10000000, count: 0, icon: '🌀' }
        ];

        // Special Upgrades
        let specials = [
            { id: 'sp-clicker', type: 'click', name: 'Stronger Grip', description: 'Doubles the base click power.', basePrice: 50, factor: 2, count: 0, icon: '💪' },
            { id: 'sp-bird', type: 'bird', name: 'Collector Bird', description: 'A bird that collects special cookies.', basePrice: 1000000000, count: 0, icon: '🐦' }
        ];

        let activeSpecialCookies = [];
        const collectorBird = document.getElementById('collector-bird');

        /**
         * SETTINGS LOGIC
         */
        function toggleSettings() {
            const dropdown = document.getElementById('settings-dropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        // Click outside closes menu
        window.onclick = function(event) {
            if (!event.target.closest('#settings-menu')) {
                document.getElementById('settings-dropdown').style.display = 'none';
            }
        };

        function saveToFile() {
            const saveData = { 
                state: state, 
                buildingCounts: buildings.map(u => ({ id: u.id, count: u.count })),
                specialCounts: specials.map(s => ({ id: s.id, count: s.count }))
            };
            const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cookie_clicker_save_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function triggerFileLoad() {
            document.getElementById('file-loader').click();
        }

        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    applySaveData(data);
                    location.reload(); // Reload for clean initialization
                } catch (err) {
                    console.error("Load failed", err);
                }
            };
            reader.readAsText(file);
        }

        function applySaveData(data) {
            if (!data.state) return;
            state = { ...state, ...data.state };
            data.buildingCounts.forEach((savedUp, index) => {
                while (index >= buildings.length) generateNextUpgrade();
                if (buildings[index]) buildings[index].count = savedUp.count;
            });
            data.specialCounts.forEach((savedSp, index) => {
                if (specials[index]) specials[index].count = savedSp.count;
            });
            calculateCPS();
            saveGame(); // Sync with LocalStorage
        }

        /**
         * UI & GAME LOGIC
         */
        function switchTab(tab) {
            state.activeTab = tab;
            document.getElementById('tab-buildings').classList.toggle('active', tab === 'buildings');
            document.getElementById('tab-special').classList.toggle('active', tab === 'special');
            initShop();
        }

        function getUpgradeEfficiencyMult(count) {
            let mult = 1;
            MILESTONES.forEach(m => {
                if (count >= m) mult *= 2;
            });
            return mult;
        }

        function getStarsForCount(count) {
            let stars = "";
            if (count >= 1000) stars = "⭐⭐⭐⭐⭐⭐⭐";
            else if (count >= 500) stars = "⭐⭐⭐⭐⭐⭐";
            else if (count >= 200) stars = "⭐⭐⭐⭐⭐";
            else if (count >= 100) stars = "⭐⭐⭐⭐";
            else if (count >= 50) stars = "⭐⭐⭐";
            else if (count >= 25) stars = "⭐⭐";
            else if (count >= 10) stars = "⭐";
            return stars;
        }

        function generateNextUpgrade() {
            const last = buildings[buildings.length - 1];
            const prefixPool = ['Quantum', 'Cosmic', 'Hyper', 'Galactic', 'Infinite', 'Divine', 'Chrono', 'Void', 'Nebula', 'Omega'];
            const entityPool = ['Synthesizer', 'Engine', 'Network', 'Dyson Sphere', 'Empire', 'God', 'Fractal', 'Singularity', 'Pulse', 'Core'];
            const iconPool = ['🧬', '🪐', '⚡', '🤖', '🔱', '🧿', '💎', '🛸', '💥', '✨'];

            const randPrefix = prefixPool[Math.floor(Math.random() * prefixPool.length)];
            const randEntity = entityPool[Math.floor(Math.random() * entityPool.length)];
            const randIcon = iconPool[Math.floor(Math.random() * iconPool.length)];
            
            const name = `${randPrefix} ${randEntity}`;
            
            buildings.push({
                id: 'gen-' + buildings.length,
                name: name,
                description: `A legendary ${name} from another dimension.`,
                basePrice: last.basePrice * 15.5,
                baseCps: last.baseCps * 8.2,
                count: 0,
                icon: randIcon
            });
        }

        const cookieDisplay = document.getElementById('cookie-count');
        const cpsDisplay = document.getElementById('cps-display');
        const clickPowerDisplay = document.getElementById('click-power-display');
        const mainCookie = document.getElementById('main-cookie');
        const shopItems = document.getElementById('shop-items');
        const particleContainer = document.getElementById('particle-container');
        const statTotalClicks = document.getElementById('stat-total-clicks');
        const statAllTime = document.getElementById('stat-all-time');
        const frenzyBar = document.getElementById('frenzy-bar');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const prestigeBar = document.getElementById('prestige-bar');
        const prestigePercent = document.getElementById('prestige-percent');
        const prestigeBtn = document.getElementById('prestige-btn');
        const currentBonusDisplay = document.getElementById('current-bonus-display');
        const prestigeNeeded = document.getElementById('prestige-needed');

        function initShop() {
            shopItems.innerHTML = '';
            
            let list = state.activeTab === 'buildings' ? buildings : specials;
            let unlockLimit = state.activeTab === 'buildings' ? state.unlockedUpgrades : list.length;

            for (let i = 0; i < unlockLimit; i++) {
                const item = list[i];
                if (!item) continue;
                
                const card = document.createElement('div');
                card.id = `upgrade-${item.id}`;
                card.className = 'upgrade-card p-4 rounded-xl flex items-center gap-4 cursor-pointer disabled shadow-sm';
                card.onclick = () => state.activeTab === 'buildings' ? buyBuilding(i) : buySpecial(i);
                
                let bonusText = "";
                if (item.type === 'click') {
                    bonusText = `Power x${item.factor}`;
                } else if (state.activeTab === 'buildings') {
                    bonusText = `Each +${formatNumber(item.baseCps)} CPS`;
                } else {
                    bonusText = "One-time purchase";
                }
                
                card.innerHTML = `
                    <div class="text-3xl">${item.icon}</div>
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <span class="font-bold">${item.name}</span>
                            <span class="text-orange-400 font-bold" id="price-${item.id}">${formatNumber(getPrice(item))}</span>
                        </div>
                        <div class="text-xs text-zinc-400">${item.description}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <div class="text-[10px] text-zinc-500">${bonusText}</div>
                            <div class="text-[10px] text-orange-500 font-bold hidden" id="boost-${item.id}">Boost: x1</div>
                        </div>
                    </div>
                    <div class="text-2xl font-bold opacity-20" id="count-${item.id}">${item.count}</div>
                `;
                shopItems.appendChild(card);
            }

            // More coming soon for Specials
            if (state.activeTab === 'special') {
                const moreLabel = document.createElement('div');
                moreLabel.className = 'text-center text-zinc-500 text-[10px] py-4 italic';
                moreLabel.innerText = 'More coming soon...';
                shopItems.appendChild(moreLabel);
            }
        }

        function formatNumber(num) {
            if (num >= 1e15) return (num / 1e15).toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' Q';
            if (num >= 1e12) return (num / 1e12).toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' T';
            if (num >= 1e9) return (num / 1e9).toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' B';
            if (num >= 1000000) return (num / 1000000).toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' M';
            if (num >= 1000) return (num / 1000).toLocaleString('en-US', { maximumFractionDigits: 2 }) + ' k';
            return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
        }

        function clickCookie(e) {
            const amount = state.clickPower * state.multiplier * state.prestigeBonus;
            addCookies(amount);
            state.totalClicks++;
            state.clickHeat = Math.min(100, state.clickHeat + 5);
            createParticle(e.clientX, e.clientY, `+${formatNumber(amount)}`);
            spawnFloatingCookie();
            updateUI();
            saveGame();
        }

        function addCookies(amount) {
            state.cookies += amount;
            state.totalCookiesEarned += amount;
        }

        function buyBuilding(index) {
            const up = buildings[index];
            const currentPrice = getPrice(up);
            if (state.cookies >= currentPrice) {
                state.cookies -= currentPrice;
                up.count++;
                
                if (index === state.unlockedUpgrades - 1 && up.count >= 5) {
                    state.unlockedUpgrades++;
                    if (state.unlockedUpgrades > buildings.length) generateNextUpgrade();
                    initShop();
                }
                calculateCPS();
                updateUI();
                saveGame();
            }
        }

        function buySpecial(index) {
            const sp = specials[index];
            const currentPrice = getPrice(sp);
            if (sp.type !== 'click' && sp.count > 0) return;
            if (state.cookies >= currentPrice) {
                state.cookies -= currentPrice;
                sp.count++;
                if (sp.type === 'click') state.clickPower *= sp.factor;
                if (sp.type === 'bird') state.hasBird = true;
                initShop();
                updateUI();
                saveGame();
            }
        }

        function getPrice(item) {
            const scalingFactor = item.id === 'sp-clicker' ? 10.0 : 1.15;
            return Math.floor(item.basePrice * Math.pow(scalingFactor, item.count));
        }

        function calculateCPS() {
            state.cps = buildings.reduce((sum, up) => {
                const mult = getUpgradeEfficiencyMult(up.count);
                return sum + (up.count * (up.baseCps || 0) * mult);
            }, 0);
        }

        function createParticle(x, y, text) {
            const p = document.createElement('div');
            p.className = 'particle text-orange-400';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.innerText = text;
            particleContainer.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }

        function spawnFloatingCookie() {
            const f = document.createElement('div');
            f.className = 'floating-cookie';
            const size = 20 + Math.random() * 30;
            f.style.width = size + 'px';
            f.style.height = size + 'px';
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 100;
            f.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            f.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            const rect = mainCookie.getBoundingClientRect();
            f.style.left = (rect.left + rect.width / 2) + 'px';
            f.style.top = (rect.top + rect.height / 2) + 'px';
            f.innerHTML = `<svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="#d2691e" /><circle cx="60" cy="60" r="10" fill="#4b3621" /><circle cx="140" cy="140" r="10" fill="#4b3621" /></svg>`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 2000);
        }

        function spawnSpecialCookie(type, x, y, vx = 0, vy = 0) {
            const wrapper = document.createElement('div');
            wrapper.className = `special-cookie-wrapper ${type}-cookie`;
            const cookieArea = document.getElementById('cookie-area');
            const areaRect = cookieArea.getBoundingClientRect();
            let startX = x !== undefined ? x : areaRect.left + 50 + Math.random() * (areaRect.width - 100);
            let startY = y !== undefined ? y : -100;
            const colorMap = { 'golden': '#ffd700', 'blue': '#00aaff', 'green': '#00ff44' };
            const shadowMap = { 'golden': '#ffcc00', 'blue': '#0077ff', 'green': '#00cc33' };

            wrapper.innerHTML = `
                <svg class="wings" viewBox="0 0 100 40">
                    <path class="wing-left" d="M30 20 C10 0, 0 10, 30 20" fill="white" stroke="gray" />
                    <path class="wing-right" d="M70 20 C90 0, 100 10, 70 20" fill="white" stroke="gray" />
                </svg>
                <div class="special-cookie-hitbox">
                    <div class="countdown-text"></div>
                    <svg viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="90" fill="${colorMap[type]}" />
                        <circle cx="100" cy="100" r="80" fill="${shadowMap[type]}" />
                        <circle cx="60" cy="60" r="8" fill="rgba(0,0,0,0.2)" />
                        <circle cx="140" cy="140" r="10" fill="rgba(0,0,0,0.2)" />
                    </svg>
                </div>
            `;
            document.body.appendChild(wrapper);

            const cookieObj = {
                element: wrapper,
                hitbox: wrapper.querySelector('.special-cookie-hitbox'),
                countdownEl: wrapper.querySelector('.countdown-text'),
                wingsEl: wrapper.querySelector('.wings'),
                type: type, x: startX, y: startY, vx: vx, vy: vy,
                gravity: 0.12, friction: 0.98, bounce: 0.6,
                state: 'falling', timer: 0, settledAt: 0, id: Math.random(), flyVx: 0
            };

            cookieObj.hitbox.onclick = (e) => triggerCookie(cookieObj, e?.clientX, e?.clientY);
            activeSpecialCookies.push(cookieObj);
        }

        function triggerCookie(cookieObj, clickX, clickY) {
            const x = clickX || cookieObj.x + 30;
            const y = clickY || cookieObj.y + 30;
            if (cookieObj.type === 'blue') {
                for(let i=0; i<3; i++) spawnSpecialCookie('green', cookieObj.x, cookieObj.y, (Math.random()-0.5)*10, -5 - Math.random()*5);
                createParticle(x, y, "SPLIT!");
            } else if (cookieObj.type === 'green') {
                for(let i=0; i<3; i++) spawnSpecialCookie('golden', cookieObj.x, cookieObj.y, (Math.random()-0.5)*10, -5 - Math.random()*5);
                createParticle(x, y, "FRAGMENTS!");
            } else if (cookieObj.type === 'golden') {
                const bonus = Math.max(10, state.cps * 60); 
                addCookies(bonus);
                createParticle(x, y, `GOLDEN! +${formatNumber(bonus)}`);
            }
            removeCookie(cookieObj.id);
        }

        function removeCookie(id) {
            const idx = activeSpecialCookies.findIndex(c => c.id === id);
            if (idx !== -1) {
                activeSpecialCookies[idx].element.remove();
                activeSpecialCookies.splice(idx, 1);
            }
        }

        function updateSpecialPhysics() {
            const ground = window.innerHeight - 80;
            const shopContainer = document.getElementById('shop-container');
            const shopLeftBound = shopContainer.getBoundingClientRect().left;

            activeSpecialCookies.forEach(c => {
                if (c.state === 'falling') {
                    c.vy += c.gravity; c.x += c.vx; c.y += c.vy;
                    if (c.y >= ground) {
                        c.y = ground; c.vy *= -c.bounce; c.vx *= 0.8;
                        if (Math.abs(c.vy) < 1) {
                            c.state = 'settled'; c.timer = 3.0;
                        }
                    }
                    if (c.x < 0) { c.x = 0; c.vx *= -1; }
                    if (c.x > shopLeftBound - 60) { c.x = shopLeftBound - 60; c.vx *= -1; }
                } else if (c.state === 'settled') {
                    c.timer -= 0.016; 
                    if (c.timer <= 0) {
                        c.state = 'flying';
                        c.wingsEl.classList.add('wings-visible');
                        c.flyVx = (Math.random() > 0.5 ? 1.5 : -1.5) * (Math.random() * 2 + 1);
                    } else c.countdownEl.innerText = c.timer.toFixed(1);
                } else if (c.state === 'flying') {
                    c.y -= 1.8; c.x += c.flyVx;
                    if (c.y < -100 || c.x < -100 || c.x > window.innerWidth + 100) removeCookie(c.id);
                }
                c.element.style.transform = `translate(${c.x}px, ${c.y}px)`;
            });

            if (state.hasBird) {
                collectorBird.style.display = 'block';
                const target = activeSpecialCookies.find(c => c.state === 'settled');
                if (target) {
                    const birdX = parseFloat(collectorBird.style.left) || 0;
                    const birdY = parseFloat(collectorBird.style.top) || 0;
                    const dx = target.x - birdX;
                    const dy = target.y - birdY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 30) triggerCookie(target);
                    else {
                        collectorBird.style.left = (birdX + dx * 0.05) + 'px';
                        collectorBird.style.top = (birdY + dy * 0.05) + 'px';
                        collectorBird.style.transform = dx > 0 ? 'scaleX(-1)' : 'scaleX(1)';
                    }
                } else {
                    const time = Date.now() / 1000;
                    collectorBird.style.left = (200 + Math.sin(time) * 100) + 'px';
                    collectorBird.style.top = (200 + Math.cos(time * 0.5) * 50) + 'px';
                }
            }
        }

        function prestige() {
            if (state.cookies < PRESTIGE_THRESHOLD) return;
            const newBonusPoints = Math.floor(state.cookies / PRESTIGE_THRESHOLD);
            const extraBonus = newBonusPoints * 0.01; 
            state.prestigeBonus += extraBonus;
            state.prestigeLevel++;
            state.cookies = 0; state.cps = 0; state.clickPower = 1;
            state.unlockedUpgrades = 1; state.clickHeat = 0;
            buildings.forEach(b => b.count = 0);
            specials.forEach(s => s.count = 0);
            initShop(); updateUI(); saveGame();
        }

        function showResetModal() {
            document.getElementById('reset-modal').style.display = 'flex';
            document.getElementById('reset-confirm-input').focus();
        }

        function closeResetModal() {
            document.getElementById('reset-modal').style.display = 'none';
            document.getElementById('reset-confirm-input').value = '';
        }

        function executeFullReset() {
            const input = document.getElementById('reset-confirm-input').value;
            if (input === 'CONFIRM') {
                localStorage.removeItem('kinetx_cookie_save_v4');
                location.reload();
            }
        }

        function updateUI() {
            cookieDisplay.innerText = `${formatNumber(state.cookies)} Cookies`;
            cpsDisplay.innerText = `per second: ${formatNumber(state.cps * state.multiplier * state.prestigeBonus)}`;
            clickPowerDisplay.innerText = `Click Power: ${formatNumber(state.clickPower)}`;
            statTotalClicks.innerText = state.totalClicks;
            statAllTime.innerText = formatNumber(state.totalCookiesEarned);
            document.title = `${formatNumber(state.cookies)} Cookies - Cookie Clicker`;
            
            if (state.clickHeat >= 100) state.multiplier = 5.0;
            else if (state.clickHeat >= 60) state.multiplier = 3.0;
            else if (state.clickHeat >= 25) state.multiplier = 1.5;
            else state.multiplier = 1.0;
            
            frenzyBar.style.width = state.clickHeat + '%';
            multiplierDisplay.innerText = `x${state.multiplier.toFixed(1)}`;
            
            if (state.multiplier >= 3.0) {
                document.body.classList.add('golden-frenzy');
                mainCookie.classList.add('shaking');
            } else {
                document.body.classList.remove('golden-frenzy');
                mainCookie.classList.remove('shaking');
            }
            if (state.multiplier >= 5) frenzyBar.classList.add('animate-pulse');
            else frenzyBar.classList.remove('animate-pulse');
            
            const remaining = Math.max(0, PRESTIGE_THRESHOLD - state.cookies);
            prestigeNeeded.innerText = `Left: ${formatNumber(remaining)}`;
            const prestigeProg = Math.min(100, (state.cookies / PRESTIGE_THRESHOLD) * 100);
            prestigeBar.style.width = prestigeProg + '%';
            prestigePercent.innerText = Math.floor(prestigeProg) + '%';
            
            if (state.cookies >= PRESTIGE_THRESHOLD) {
                prestigeBtn.classList.remove('hidden');
                prestigeNeeded.innerText = "Ready for Prestige!";
            } else prestigeBtn.classList.add('hidden');
            
            currentBonusDisplay.innerText = `Current Bonus: +${((state.prestigeBonus - 1) * 100).toFixed(0)}%`;
            
            let list = state.activeTab === 'buildings' ? buildings : specials;
            list.forEach(item => {
                const card = document.getElementById(`upgrade-${item.id}`);
                if (card) {
                    const price = getPrice(item);
                    if (state.cookies >= price) card.classList.remove('disabled');
                    else card.classList.add('disabled');
                    
                    const countEl = document.getElementById(`count-${item.id}`);
                    if (countEl) countEl.innerText = item.count;

                    if (state.activeTab === 'buildings') {
                        const boostLabel = document.getElementById(`boost-${item.id}`);
                        const effMult = getUpgradeEfficiencyMult(item.count);
                        const stars = getStarsForCount(item.count);
                        if (effMult > 1) {
                            boostLabel.innerText = `${stars} Boost: x${effMult}`;
                            boostLabel.classList.remove('hidden');
                        } else boostLabel.classList.add('hidden');
                    }
                }
            });
        }

        function saveGame() {
            const saveData = { 
                state: state, 
                buildingCounts: buildings.map(u => ({ id: u.id, count: u.count })),
                specialCounts: specials.map(s => ({ id: s.id, count: s.count }))
            };
            localStorage.setItem('kinetx_cookie_save_v4', JSON.stringify(saveData));
        }

        function loadGame() {
            const saved = localStorage.getItem('kinetx_cookie_save_v4');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    applySaveData(data);
                } catch (e) { console.error("Load failed", e); }
            }
        }

        function runTick() {
            const now = Date.now();
            const delta = (now - state.lastTick) / 1000;
            if (delta < 0.001) return;
            state.lastTick = now;
            state.clickHeat = Math.max(0, state.clickHeat - (15 * delta));
            if (state.cps > 0) addCookies(state.cps * state.multiplier * state.prestigeBonus * delta);
            if (state.multiplier >= 3.0) {
                state.goldenCookieTimer += delta;
                if (state.goldenCookieTimer >= 5) {
                    spawnSpecialCookie('golden');
                    state.goldenCookieTimer = 0;
                }
            } else state.goldenCookieTimer = 0;
            state.randomGoldenSpawnTimer += delta;
            if (state.randomGoldenSpawnTimer >= 1.0) {
                if (Math.random() < 0.002) spawnSpecialCookie('golden');
                state.randomGoldenSpawnTimer = 0;
            }
            state.blueCookieSpawnTimer += delta;
            if (state.blueCookieSpawnTimer >= 1.0) {
                if (Math.random() < 0.01) spawnSpecialCookie('blue');
                state.blueCookieSpawnTimer = 0;
            }
            updateSpecialPhysics();
            updateUI();
        }

        function gameLoop() {
            runTick();
            requestAnimationFrame(gameLoop);
        }

        setInterval(() => { runTick(); }, 1000);
        setInterval(saveGame, 30000);

        mainCookie.addEventListener('mousedown', (e) => { clickCookie(e); });
        mainCookie.addEventListener('contextmenu', e => e.preventDefault());
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keysPressed[key] = true;
            if (keysPressed['k'] && keysPressed['n'] && keysPressed['x']) {
                showResetModal();
            }
            if (e.code === 'Space') {
                e.preventDefault();
                const rect = mainCookie.getBoundingClientRect();
                clickCookie({ clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
                mainCookie.style.transform = 'scale(0.95)';
            }
        });
        
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            keysPressed[key] = false;
            if (e.code === 'Space') mainCookie.style.transform = ''; 
        });

        loadGame();
        initShop();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
